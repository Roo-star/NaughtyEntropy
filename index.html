    breathUntilTime = time + LEVEL_GAP_BREATH_SEC;
  }
}

/**
 * 最近軌道中心對應的 lane（與白方塊 wallPos(lane) 一致）。
 * 不可用 floor(u+TH)：例如左牆 py=L=2 時 floor(2+3-ε)=4，但視覺上貼上邊應屬最上軌 lane5（中心 y=2.5），
 * 會誤判成第 2 條軌而與鄰軌白方塊碰撞。
 * 平手：bottom/top 取較小 lane（偏左）；left/right 取較大 lane（偏上）。
 */
function laneIndexNearestForWall(u, side) {
  const horiz = side === 'bottom' || side === 'top';
  let best = 0;
  let bd = Infinity;
  for (let lane = 0; lane < wallLanes; lane++) {
    const c = -TUNNEL_HALF + lane + 0.5;
    const d = Math.abs(u - c);
    if (d < bd - 1e-9) {
      bd = d;
      best = lane;
    } else if (Math.abs(d - bd) <= 1e-9) {
      if (horiz && lane < best) best = lane;
      if (!horiz && lane > best) best = lane;
    }
  }
  return best;
}

/** 玩家貼邊時可能屬的牆面與 lane（轉角會回傳兩條候選） */
function getPlayerTracks(px, py, L, eps) {
  const onL = px <= -L + eps;
  const onR = px >= L - eps;
  const onB = py <= -L + eps;
  const onT = py >= L - eps;
  const tracks = [];
  if (onB) tracks.push({ side: 'bottom', lane: laneIndexNearestForWall(px, 'bottom') });
  if (onT) tracks.push({ side: 'top', lane: laneIndexNearestForWall(px, 'top') });
  if (onL) tracks.push({ side: 'left', lane: laneIndexNearestForWall(py, 'left') });
  if (onR) tracks.push({ side: 'right', lane: laneIndexNearestForWall(py, 'right') });
  return tracks;
}

const SIDE_PRIORITY = { bottom: 0, left: 1, top: 2, right: 3 };

/** 碰撞僅用「當下主軌」：非轉角即該邊；轉角取貼邊法向距離較小者（平手依牆優先序） */
function getDominantPlayerTrack(px, py, L, eps) {
  const tracks = getPlayerTracks(px, py, L, eps);
  if (tracks.length === 0) return null;
  if (tracks.length === 1) return tracks[0];
  const sorted = tracks.slice().sort((a, b) => SIDE_PRIORITY[a.side] - SIDE_PRIORITY[b.side]);
  let best = sorted[0];
  let bd = Infinity;
  for (const t of sorted) {
    let d = 0;
    if (t.side === 'bottom') d = Math.abs(py + L);
    else if (t.side === 'top') d = Math.abs(py - L);
    else if (t.side === 'left') d = Math.abs(px + L);
    else d = Math.abs(px - L);
    if (d < bd - 1e-6) {
      bd = d;
      best = t;
    }
  }
  return best;
}

/** 判定矩形周長的四個轉角（同時貼兩條正交邊） */
function isJudgmentCorner(px, py, L, eps) {
  const onL = px <= -L + eps;
  const onR = px >= L - eps;
  const onB = py <= -L + eps;
  const onT = py >= L - eps;
  return (onB && onL) || (onB && onR) || (onT && onL) || (onT && onR);
}

/**
 * 非轉角貼邊時：往對側水平／垂直瞬移（左↔右 y 不變、下↔上 x 不變）。
 * 轉角僅能沿兩邊「正常」滑動，不觸發瞬移（由 filterJudgmentPerimeterInput 處理）。
 */
function tryJudgmentOppositeWarp(px, py, rdx, rdy, L, eps) {
  if (isJudgmentCorner(px, py, L, eps)) return null;

  const th = 1e-7;
  const onL = px <= -L + eps;
  const onR = px >= L - eps;
  const onB = py <= -L + eps;
  const onT = py >= L - eps;

  const clampX = (x) => Math.max(-L, Math.min(L, x));
  const clampY = (y) => Math.max(-L, Math.min(L, y));

  const opts = [];
  if (onL && rdx > th) {
    opts.push({ w: Math.abs(rdx), x: L, y: clampY(py) });
  }
  if (onR && rdx < -th) {
    opts.push({ w: Math.abs(rdx), x: -L, y: clampY(py) });
  }
  if (onB && rdy > th) {
    opts.push({ w: Math.abs(rdy), x: clampX(px), y: L });
  }
  if (onT && rdy < -th) {
    opts.push({ w: Math.abs(rdy), x: clampX(px), y: -L });
  }
  if (opts.length === 0) return null;
  opts.sort((a, b) => b.w - a.w);
  const o = opts[0];
  return { x: o.x, y: o.y };
}

const WALL_INSET = TUNNEL_HALF - 0.5;

/** 已確認同軌後：沿軸向對齊 + 法向貼牆（避免鄰軌誤判） */
function planarOverlapSameTrackOnly(cube, px, py) {
  const lp = cube.wallPos(cube.lane);
  const hg = PLAYER_CUBE_SIZE * 0.5;
  const hw = CUBE_EDGE * 0.5;
  const alongLim = Math.min(hg + hw, 0.92);
  const perpLim = hg + 0.52;
  switch (cube.side) {
    case 'bottom':
      if (Math.abs(py + WALL_INSET) > perpLim) return false;
      return Math.abs(px - lp) < alongLim;
    case 'top':
      if (Math.abs(py - WALL_INSET) > perpLim) return false;
      return Math.abs(px - lp) < alongLim;
    case 'left':
      if (Math.abs(px + WALL_INSET) > perpLim) return false;
      return Math.abs(py - lp) < alongLim;
    case 'right':
      if (Math.abs(px - WALL_INSET) > perpLim) return false;
      return Math.abs(py - lp) < alongLim;
    default:
      return false;
  }
}

function shuffleInPlace(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = (Math.random() * (i + 1)) | 0;
    const t = arr[i];
    arr[i] = arr[j];
    arr[j] = t;
  }
  return arr;
}

/**
 * ── 生成機制說明 ──
 * 所有方塊都從 depth=0（隧道口最前端）開始滾動。
 * 用 delay（秒）控制每顆方塊何時進場。
 * delay=0 的方塊立即出現，delay=2 的方塊 2 秒後從洞口出現。
 * 同軌方塊之間的 delay 差距 = 距離差 / (ROLL_SPEED × speedMul)。
 *
 * 一顆 speedMul=1 的方塊滾完整條隧道需要 MAX_DEPTH / ROLL_SPEED ≈ 4.7 秒。
 * 所以一波的持續時間 ≈ 5.87s + 最後一顆方塊的 delay。
 *
 * 你設定的「數量」就是這一波實際出現的方塊總數，直觀對應。
 */

/** 每次呼叫都重新擲骰——每顆方塊各自獨立速度。waveDef.speedRange 優先於 def.speedRange */
function hazardOptsForWave(def, waveDef) {
  const sr = (waveDef && waveDef.speedRange) || def.speedRange;
  if (sr) {
    const [lo, hi] = sr;
    return { speedMul: lo + Math.random() * (hi - lo) };
  }
  if (waveDef && waveDef.speedMul) return { speedMul: waveDef.speedMul };
  if (def.speedMul) return { speedMul: def.speedMul };
  return {};
}

function randInRange(range) {
  return range[0] + ((Math.random() * (range[1] - range[0] + 1)) | 0);
}

/**
 * 距離差規則：同軌道相鄰方塊保持 MIN_DEPTH_GAP~MAX_DEPTH_GAP 格距離。
 * 轉換為 delay 間距 = 格距 / (ROLL_SPEED × 較慢方塊的 speedMul)。
 * 這允許同軌道同時有多個方塊在場，只要保持間距。
 */
/**
 * 均勻分配軌道：把 n 個方塊輪轉分配到 slots 上，每條軌道最多比其他多 1 個方塊。
 * 每輪重新洗牌，保證隨機性。
 */
function roundRobinSlots(slots, n) {
  const result = [];
  const pool = slots.slice();
  while (result.length < n) {
    shuffleInPlace(pool);
    for (let i = 0; i < pool.length && result.length < n; i++) {
      result.push({ side: pool[i].side, lane: pool[i].lane });
    }
  }
  return result;
}

/**
 * 嚴格獨佔規則：同軌道上的下一個方塊必須在前一個方塊完全滾出隧道之後才進場。
 * transitTime = MAX_DEPTH / (ROLL_SPEED * speedMul)
 */
function enforceTrackExclusive(entries) {
  const groups = new Map();
  for (const e of entries) {
    const k = slotKey(e);
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(e);
  }
  for (const arr of groups.values()) {
    if (arr.length <= 1) continue;
    arr.sort((a, b) => a.delay - b.delay);
    for (let i = 1; i < arr.length; i++) {
      const prevSpeed = arr[i - 1].opts.speedMul || 1;
      const prevTransit = MAX_DEPTH / (ROLL_SPEED * prevSpeed);
      const earliest = arr[i - 1].delay + prevTransit;
      if (arr[i].delay < earliest) {
        arr[i].delay = earliest;
      }
    }
  }
}

/** 密集圈：20 軌中空 1-4 軌，均勻分配到各軌道 */
function generateDenseEntries(count, baseDelay, levelDef, waveDef) {
  const entries = [];
  const all = allWallSlots();
  const emptyCount = 1 + ((Math.random() * 4) | 0);
  shuffleInPlace(all);
  const forbiddenKeys = new Set(all.slice(0, emptyCount).map(slotKey));
  const allowed = all.filter(s => !forbiddenKeys.has(slotKey(s)));

  const slots = roundRobinSlots(allowed, count);
  for (let i = 0; i < count; i++) {
    const denseDelay = baseDelay + Math.random() * 0.5;
    entries.push({
      side: slots[i].side, lane: slots[i].lane, delay: denseDelay,
      opts: hazardOptsForWave(levelDef, waveDef),
    });
  }
  return entries;
}

/** 連排：指定方向 6 軌同時進場、同速度、平齊無距離差 */
function generateRowEntries(side, delay, levelDef, waveDef) {
  const entries = [];
  const sharedOpts = hazardOptsForWave(levelDef, waveDef);
  for (let lane = 0; lane < wallLanes; lane++) {
    entries.push({ side, lane, delay, opts: { ...sharedOpts } });
  }
  return entries;
}

/**
 * 為一波的 n 顆方塊分配隨機 delay。
 * spreadSec = 這些方塊分散進場的時間跨度（秒）。
 * 第一顆 delay=0，最後一顆 delay ≈ spreadSec。
 */
function assignRandomDelays(n, spreadSec) {
  const delays = [];
  for (let i = 0; i < n; i++) {
    delays.push(Math.random() * spreadSec);
  }
  delays.sort((a, b) => a - b);
  return delays;
}

function generateWave() {
  // 每一波第一個立方體滾來前重新開啟追蹤力
  trackingEnabled = true;
  trackingMissCount = 0;
  trackingThreshold = 3 + ((Math.random() * 3) | 0);
  trackingLastSide = null;
  trackingLastLane = -1;

  const Lv = currentLevel;
  const def = getLevelDef(Lv);
  const waveDef = def.waves[currentWaveIndex] || def.waves[0];

  const [nMin, nMax] = waveDef.count;
  let n = randInRange(waveDef.count);

  let allowed = allWallSlots();
  if (Lv === 4) {
    const forb = pickTwoForbiddenSlotsLv4();
    const fk = new Set(forb.map(slotKey));
    allowed = allowed.filter(s => !fk.has(slotKey(s)));
  }

  let entries = [];

  // 進場分散時間：方塊越多，分散越久，保證畫面不會瞬間塞滿
  // denseSpread：縮短間距，讓方塊更密集連續（Lv.5 效果）
  const spreadSec = waveDef.denseSpread
    ? Math.max(2, n * 0.15)
    : Math.max(2, n * 0.35);

  if (waveDef.type === 'dense') {
    entries = generateDenseEntries(n, 0, def, waveDef);
  } else {
    // rowCount：Lv.6 隨機時間先後出現的連排數量（每次一個方向）
    const rowCount = waveDef.rowCount || 0;
    const rowSides = ['top', 'bottom', 'left', 'right'];

    if (rowCount > 0) {
      // 連排佔用 rowCount * 6 個方塊，剩下是普通方塊
      const rowTotal = rowCount * 6;
      const normalN = Math.max(0, n - rowTotal);

      // 先為全部方塊（普通 + 連排）生成分散的 delay
      const allDelays = assignRandomDelays(n, spreadSec);

      // 從 allDelays 中取 rowCount 個隨機時間點給連排（選靠後的位置，讓普通方塊先到）
      const rowDelayIndices = [];
      const available = Array.from({ length: n }, (_, i) => i);
      shuffleInPlace(available);
      for (let i = 0; i < rowCount; i++) rowDelayIndices.push(available[i]);
      rowDelayIndices.sort((a, b) => a - b);

      // 連排方向隨機選，不重複
      const shuffledSides = rowSides.slice();
      shuffleInPlace(shuffledSides);
      for (let i = 0; i < rowCount; i++) {
        const dir = shuffledSides[i % shuffledSides.length];
        const rowDelay = allDelays[rowDelayIndices[i]];
        entries.push(...generateRowEntries(dir, rowDelay, def, waveDef));
      }

      // 剩餘普通方塊，用未被連排佔用的 delay 索引
      const usedIdx = new Set(rowDelayIndices);
      const normalDelays = allDelays.filter((_, i) => !usedIdx.has(i));
      const slots = roundRobinSlots(allowed, normalN);
      for (let i = 0; i < normalN; i++) {
        entries.push({
          side: slots[i].side, lane: slots[i].lane,
          delay: normalDelays[i] ?? spreadSec * Math.random(),
          opts: hazardOptsForWave(def, waveDef),
        });
      }
    } else {
      const delays = assignRandomDelays(n, spreadSec);
      const slots = roundRobinSlots(allowed, n);
      for (let i = 0; i < n; i++) {
        entries.push({
          side: slots[i].side, lane: slots[i].lane,
          delay: delays[i],
          opts: hazardOptsForWave(def, waveDef),
        });
      }
    }
  }

  // 金/紅方塊：優先分配到空閒軌道，空閒不足時允許和白方塊共軌排隊
  // enforceTrackExclusive 會確保同軌道方塊依序進場，不會同時出現
  {
    const allSlots = allWallSlots();
    shuffleInPlace(allSlots);
    const usedSlotKeys = new Set(entries.map(e => slotKey(e)));
    const freeSlots = allSlots.filter(s => !usedSlotKeys.has(slotKey(s)));
    // 若空閒不夠，回落到所有軌道隨機選
    // 計算每個軌道已排隊的方塊數，優先選排隊最少的
    const queueCount = new Map();
    for (const e of entries) {
      const k = slotKey(e);
      queueCount.set(k, (queueCount.get(k) || 0) + 1);
    }
    const pickSlots = (count) => {
      // 按排隊數升序排列所有軌道，優先放隊伍短的
      const sorted = allSlots.slice().sort((a, b) =>
        (queueCount.get(slotKey(a)) || 0) - (queueCount.get(slotKey(b)) || 0)
      );
      const result = [];
      for (let i = 0; i < count; i++) {
        result.push(sorted[i % sorted.length]);
      }
      return result;
    };

    const pickupRange = waveDef.pickups;
    if (pickupRange) {
      const pCount = Array.isArray(pickupRange) ? randInRange(pickupRange) : pickupRange;
      const pSlots = pickSlots(pCount);
      for (let i = 0; i < pCount; i++) {
        const dly = Math.random() * spreadSec;
        const pSpeed = Math.random() < 0.5 ? 0.25 : 0.5;
        entries.push({ side: pSlots[i].side, lane: pSlots[i].lane, delay: dly, opts: { isPickup: true, speedMul: pSpeed } });
      }
    }

    const sdCount = waveDef.slowdowns || 0;
    if (sdCount > 0) {
      const sdSlots = pickSlots(sdCount);
      for (let i = 0; i < sdCount; i++) {
        const dly = 1 + Math.random() * Math.max(1, spreadSec - 2);
        entries.push({ side: sdSlots[i].side, lane: sdSlots[i].lane, delay: dly, opts: { isSlowdown: true, speedMul: SLOWDOWN_CUBE_SPEED_MUL } });
      }
    }
  }

  // 嚴格獨佔：同軌道前一個方塊完全滾出後下一個才進場
  enforceTrackExclusive(entries);

  for (const e of entries) {
    rollingCubes.push(new RollingCube(e.side, e.lane, 0, { ...e.opts, delay: e.delay }));
  }
}

// ── Player：與白方塊同款的線框+點陣，金色；depthWrite false 避免遮擋白方塊線條 ──
// 群組 z=PLAYER_Z；子網格 z=-hg，使【近端面】(+z 朝相機)貼齊判定面 z=PLAYER_Z（白方塊 whiteNearZ 同側）
function createPlayerCube() {
  const s = PLAYER_CUBE_SIZE;
  const hg = s * 0.5;
  const group = new THREE.Group();
  const mesh = createDottedCube(playerWireMat, playerDotMat, { includeDots: true, includeFrame: false });
  mesh.position.z = -hg;
  mesh.traverse((ch) => {
    if (ch.isMesh) ch.renderOrder = -2;
  });
  group.add(mesh);
  group.renderOrder = -2;
  return group;
}

let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().then(() => {
      if (audioCtx.state === 'running') {
        primeAudioContext(audioCtx);
        startBgm();
      }
    }).catch(() => {});
  } else if (audioCtx.state === 'running') {
    primeAudioContext(audioCtx);
    startBgm();
  }
  return audioCtx;
}

let bgmStarted = false;
let bgmGain = null;
let bgmOscs = [];
let bgmChordTimer = null;
let audioPrimed = false;
function primeAudioContext(ctx) {
  if (audioPrimed || !ctx || ctx.state !== 'running') return;
  audioPrimed = true;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  gain.gain.value = 0.0001;
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.03);
}

function startBgm() {
  if (bgmStarted || !audioCtx || audioCtx.state !== 'running') return;
  bgmStarted = true;
  const ctx = audioCtx;
  bgmGain = ctx.createGain();
  bgmGain.gain.value = 0.39;

  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 820;
  filter.Q.value = 0.9;

  const delay = ctx.createDelay(1.2);
  delay.delayTime.value = 0.42;
  const feedback = ctx.createGain();
  feedback.gain.value = 0.28;
  delay.connect(feedback).connect(delay);

  bgmGain.connect(filter).connect(delay).connect(ctx.destination);
  filter.connect(ctx.destination);

  const oscTypes = ['sawtooth', 'triangle', 'sine'];
  for (let i = 0; i < 3; i++) {
    const osc = ctx.createOscillator();
    osc.type = oscTypes[i];
    const g = ctx.createGain();
    g.gain.value = i === 0 ? 0.022 : 0.016;
    osc.connect(g).connect(bgmGain);
    osc.start();
    bgmOscs.push(osc);
  }

  const chords = [
    [130.81, 164.81, 196.00],
    [146.83, 185.00, 220.00],
    [110.00, 146.83, 174.61],
    [123.47, 155.56, 207.65],
  ];
  let chordIdx = 0;
  const setChord = () => {
    const now = ctx.currentTime;
    const chord = chords[chordIdx % chords.length];
    for (let i = 0; i < bgmOscs.length; i++) {
      bgmOscs[i].frequency.cancelScheduledValues(now);
      bgmOscs[i].frequency.linearRampToValueAtTime(chord[i] * (i === 2 ? 2 : 1), now + 1.8);
    }
    filter.frequency.linearRampToValueAtTime(620 + Math.random() * 520, now + 2.0);
    chordIdx++;
  };
  setChord();
  bgmChordTimer = setInterval(setChord, 5200);
}

function playScoreSound() {
  const ctx = ensureAudio();
  const now = ctx.currentTime;
  for (let i = 0; i < 3; i++) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime([880, 1175, 1568][i], now + i * 0.045);
    gain.gain.setValueAtTime(0, now + i * 0.045);
    gain.gain.linearRampToValueAtTime(0.055, now + i * 0.045 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.045 + 0.16);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now + i * 0.045);
    osc.stop(now + i * 0.045 + 0.18);
  }
}

let lastMoveSoundAt = 0;
function playMoveSound() {
  const ctx = ensureAudio();
  const now = ctx.currentTime;
  if (now - lastMoveSoundAt < 0.045) return;
  lastMoveSoundAt = now;

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  osc.type = 'square';
  filter.type = 'bandpass';
  filter.frequency.value = 1100;
  filter.Q.value = 5.5;
  osc.frequency.setValueAtTime(420, now);
  osc.frequency.exponentialRampToValueAtTime(760, now + 0.055);
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.035, now + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.105);
  osc.connect(filter).connect(gain).connect(ctx.destination);
  osc.start(now);
  osc.stop(now + 0.12);
}

function playIntroWarpSound() {
  const ctx = ensureAudio();
  if (!ctx || ctx.state !== 'running') return;
  const now = ctx.currentTime;
  const master = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  const drone = ctx.createOscillator();
  const sub = ctx.createOscillator();
  const pop = ctx.createOscillator();
  const popGain = ctx.createGain();

  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(180, now);
  filter.frequency.exponentialRampToValueAtTime(2600, now + 6.55);
  filter.frequency.exponentialRampToValueAtTime(90, now + 7.15);
  master.gain.setValueAtTime(0.0001, now);
  master.gain.exponentialRampToValueAtTime(0.16, now + 0.35);
  master.gain.exponentialRampToValueAtTime(0.28, now + 6.45);
  master.gain.exponentialRampToValueAtTime(0.0001, now + 7.35);

  drone.type = 'sawtooth';
  drone.frequency.setValueAtTime(42, now);
  drone.frequency.exponentialRampToValueAtTime(74, now + 6.55);
  sub.type = 'sine';
  sub.frequency.setValueAtTime(21, now);
  sub.frequency.exponentialRampToValueAtTime(33, now + 6.55);

  drone.connect(filter);
  sub.connect(filter);
  filter.connect(master).connect(ctx.destination);
  drone.start(now);
  sub.start(now);
  drone.stop(now + 7.45);
  sub.stop(now + 7.45);

  pop.type = 'square';
  pop.frequency.setValueAtTime(1200, now + 6.95);
  pop.frequency.exponentialRampToValueAtTime(180, now + 7.05);
  popGain.gain.setValueAtTime(0.0001, now + 6.9);
  popGain.gain.exponentialRampToValueAtTime(0.22, now + 6.95);
  popGain.gain.exponentialRampToValueAtTime(0.0001, now + 7.12);
  pop.connect(popGain).connect(ctx.destination);
  pop.start(now + 6.9);
  pop.stop(now + 7.15);
}

const MOVE_KEY_CODES = new Set([
  'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown',
  'KeyA', 'KeyD', 'KeyW', 'KeyS',
]);
const HELD_MOVE_INITIAL_DELAY = 0.24;
const HELD_MOVE_REPEAT_INTERVAL = 0.11;
let heldMoveCode = null;
let heldMoveTimer = 0;

function inputCodeToDir(code) {
  switch (code) {
    case 'ArrowLeft':
    case 'KeyA':
      return { rdx: -PLAYER_GRID_STEP, rdy: 0 };
    case 'ArrowRight':
    case 'KeyD':
      return { rdx: PLAYER_GRID_STEP, rdy: 0 };
    case 'ArrowUp':
    case 'KeyW':
      return { rdx: 0, rdy: PLAYER_GRID_STEP };
    case 'ArrowDown':
    case 'KeyS':
      return { rdx: 0, rdy: -PLAYER_GRID_STEP };
    default:
      return null;
  }
}

/** 每鍵一步：先判瞬移對邊，否則沿周長移動一格 */
function playerMoveFromKey(code) {
  if (tutorialPause) {
    const dir0 = inputCodeToDir(code);
    if (dir0) closeGuideByInput(false);
    return;
  }
  if (!gameStarted) return;
  if (gameOver) return;
  const dir = inputCodeToDir(code);
  if (!dir) return;
  ensureAudio();
  nudgeBlackHoleFlow(dir.rdx, dir.rdy);
  const L = PLAYER_XY_LIMIT;
  const px = playerPos.x;
  const py = playerPos.y;

  const warp = tryJudgmentOppositeWarp(px, py, dir.rdx, dir.rdy, L, PERIM_EDGE_EPS);
  if (warp) {
    playerPos.x = snapCoordToHalfGrid(warp.x);
    playerPos.y = snapCoordToHalfGrid(warp.y);
    playMoveSound();
    return;
  }
  const step = discreteStepAlongEdge(px, py, Math.sign(dir.rdx) || 0, Math.sign(dir.rdy) || 0, L, PERIM_EDGE_EPS);
  if (step) {
    playerPos.x = step.x;
    playerPos.y = step.y;
    playMoveSound();
  }
}

window.addEventListener('keydown', (e) => {
  ensureAudio();
  if (e.code === 'Space') {
    triggerSpaceAction();
    e.preventDefault();
    return;
  }
  if (MOVE_KEY_CODES.has(e.code)) {
    if (tutorialPause) {
      closeGuideByInput(false);
      e.preventDefault();
      return;
    }
    if (heldMoveCode !== e.code) {
      playerMoveFromKey(e.code);
      heldMoveCode = e.code;
      heldMoveTimer = HELD_MOVE_INITIAL_DELAY;
    }
    e.preventDefault();
  }
});

window.addEventListener('keyup', (e) => {
  if (e.code === heldMoveCode) {
    heldMoveCode = null;
    heldMoveTimer = 0;
  }
});
window.addEventListener('blur', () => {
  heldMoveCode = null;
  heldMoveTimer = 0;
});

let lastTapAt = 0;
let touchGestureHandled = false;
window.addEventListener('touchstart', (e) => {
  if (!e.touches || e.touches.length === 0) return;
  ensureAudio();
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchGestureHandled = false;
}, { passive: true });

function handleSwipeDelta(dx, dy) {
  const ax = Math.abs(dx);
  const ay = Math.abs(dy);
  if (Math.max(ax, ay) < SWIPE_TRIGGER_PX) return false;
  if (ax > ay) playerMoveFromKey(dx > 0 ? 'ArrowRight' : 'ArrowLeft');
  else playerMoveFromKey(dy > 0 ? 'ArrowDown' : 'ArrowUp');
  return true;
}

window.addEventListener('touchmove', (e) => {
  if (!e.touches || e.touches.length === 0) return;
  const x = e.touches[0].clientX;
  const y = e.touches[0].clientY;
  if (handleSwipeDelta(x - touchStartX, y - touchStartY)) {
    touchGestureHandled = true;
    touchStartX = x;
    touchStartY = y;
    e.preventDefault();
  }
}, { passive: false });

window.addEventListener('touchend', (e) => {
  if (!e.changedTouches || e.changedTouches.length === 0) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const ax = Math.abs(dx);
  const ay = Math.abs(dy);
  if (!touchGestureHandled && Math.max(ax, ay) < 28) {
    const now = performance.now();
    if (now - lastTapAt < 360) {
      lastTapAt = 0;
      triggerMobileDoubleTapSpace();
      e.preventDefault();
    } else {
      lastTapAt = now;
    }
    return;
  }
  if (!touchGestureHandled) handleSwipeDelta(dx, dy);
  e.preventDefault();
}, { passive: false });

function cubeIntersectsPlayerDepthBand(cube, padding = 0) {
  const hw = CUBE_EDGE * 0.5;
  const zc = -cube.depth;
  const cubeNearZ = zc + hw;
  const cubeFarZ = zc - hw;
  return cubeNearZ >= PLAYER_Z - padding && cubeFarZ <= PLAYER_Z + padding;
}

/** 金色拾取(分數翻倍) & 紅色減速(全局 0.5x 持續 4.5s) */
function tryCollectSpecials() {
  const px = playerPos.x;
  const py = playerPos.y;
  const L = PLAYER_XY_LIMIT;
  // 特殊方塊用所有玩家所在軌道判定，避免角落時主軌誤判漏掉
  const tracks = getPlayerTracks(px, py, L, PERIM_EDGE_EPS);
  if (tracks.length === 0) return;

  for (let i = rollingCubes.length - 1; i >= 0; i--) {
    const cube = rollingCubes[i];
    if ((!cube.isPickup && !cube.isSlowdown && !cube.isRainbow) || cube.collected || !cube.visible) continue;

    // 只要玩家在任意一條軌道上與此方塊同側同lane即可觸發
    const onTrack = tracks.some(t => t.side === cube.side && t.lane === cube.lane);
    if (!onTrack) continue;

    const depthPadding = cube.isRainbow ? RAINBOW_COLLISION_DEPTH_PADDING : 0;
    if (!cubeIntersectsPlayerDepthBand(cube, depthPadding)) continue;

    if (!planarOverlapSameTrackOnly(cube, px, py)) continue;

    cube.collected = true;
    const wc = cube.getWorldCenter();
    if (cube.isRainbow) {
      addScore(1000, '+1000', '#66ffff');
      spawnParticles(wc, cube.fxColor || cube.cubeFadeMat.color || new THREE.Color(0x66ffff), 46, 4.2);
      playScoreSound();
    } else if (cube.isPickup) {
      addScore(5000, '+5000', '#66ffff');
      spawnParticles(wc, new THREE.Color(0x66ffff), 62, 5.0);
      playScoreSound();
    } else if (cube.isSlowdown) {
      globalSlowUntil = time + GLOBAL_SLOW_DURATION;
      showFloatingText('SLOW TIME', '#ff4444');
      spawnParticles(wc, cube.fxColor || new THREE.Color(0xff2222), 54, 4.5);
      playScoreSound();
    }
    cube.dispose();
    rollingCubes.splice(i, 1);
  }
}

// ── Collision：僅「當下主軌」上的白方塊 + 判定面 z 帶 + 同軌平面重疊；其他軌道幾何重疊一律不計
function checkCollision() {
  const px = playerPos.x;
  const py = playerPos.y;
  const L = PLAYER_XY_LIMIT;
  const track = getDominantPlayerTrack(px, py, L, PERIM_EDGE_EPS);
  if (!track) return false;

  const hw = CUBE_EDGE * 0.5;
  const hg = PLAYER_CUBE_SIZE * 0.5;

  for (const cube of rollingCubes) {
    if (!cube.visible || cube.isPickup || cube.isSlowdown || cube.isRainbow) continue;
    if (cube.side !== track.side || cube.lane !== track.lane) continue;

    const zc = -cube.depth;
    const whiteNearZ = zc + hw;
    const whiteFarZ = zc - hw;
    if (whiteNearZ < PLAYER_Z) continue;
    if (whiteFarZ > PLAYER_Z) continue;

    if (!planarOverlapSameTrackOnly(cube, px, py)) continue;
    return true;
  }
  return false;
}

function handleHazardCollisions() {
  const px = playerPos.x;
  const py = playerPos.y;
  const L = PLAYER_XY_LIMIT;
  const track = getDominantPlayerTrack(px, py, L, PERIM_EDGE_EPS);
  if (!track) return;

  const hw = CUBE_EDGE * 0.5;
  for (let i = rollingCubes.length - 1; i >= 0; i--) {
    const cube = rollingCubes[i];
    if (!cube.visible || cube.isPickup || cube.isSlowdown || cube.isRainbow || cube.collected) continue;
    if (cube.side !== track.side || cube.lane !== track.lane) continue;

    const zc = -cube.depth;
    const whiteNearZ = zc + hw;
    const whiteFarZ = zc - hw;
    if (whiteNearZ < PLAYER_Z) continue;
    if (whiteFarZ > PLAYER_Z) continue;
    if (!planarOverlapSameTrackOnly(cube, px, py)) continue;

    cube.collected = true;
    levelHitCount++;
    lives = Math.max(0, lives - 1);
    holeValue = Math.floor(holeValue * 0.5);
    if (holeValue < getHoleMaxForLevel(entropyQuotaLevel) && holeState === 'charged') {
      holeState = 'idle';
      voidUiEl.classList.remove('void-full');
    }
    updateLivesUI();
    showFloatingText('-1 ❤', '#ff3355');
    playHitSound();
    flashHitFace(cube);
    spawnParticles(cube.getWorldCenter(), new THREE.Color(0xff2233), 70, 5.2);
    cube.dispose();
    rollingCubes.splice(i, 1);

    if (lives <= 0) {
      gameOver = true;
      gameoverMaskEl.style.display = 'block';
      gameoverEl.style.display = 'block';
      finalscoreEl.textContent = score;
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('gridTunnelBestScore', String(bestScore));
      }
      bestScoreEl.textContent = bestScore;
      return;
    }
  }
}

function scoreNearMisses() {
  const track = getDominantPlayerTrack(playerPos.x, playerPos.y, PLAYER_XY_LIMIT, PERIM_EDGE_EPS);
  if (!track) return;
  const passDepth = -PLAYER_Z + CUBE_EDGE * 0.5;
  for (const cube of rollingCubes) {
    if (cube.isPickup || cube.isSlowdown || cube.isRainbow || cube.collected || cube._nearMissScored) continue;
    if (cube.depth < passDepth) continue;
    cube._nearMissScored = true;
    if (cube.side === track.side && Math.abs(cube.lane - track.lane) <= 1 && cube.lane !== track.lane) {
      score += 50;
      updateScoreUI();
      showNearTrackText('CLOSE CALL +50', cube, '#66ffff');
    }
  }
}

// GSAP easing 控制視覺狀態；遊戲邏輯仍由 holeState/holeValue 控制
const holeMotion = {
  charge: 0,
  tileAlpha: 0,
  fluidOpacity: 0,
  burst: 0,
  inputX: 0,
  inputY: 0,
};
const easeHoleCharge = gsap.quickTo(holeMotion, 'charge', { duration: 0.7, ease: 'power3.out' });
const easeTileAlpha = gsap.quickTo(holeMotion, 'tileAlpha', { duration: 0.55, ease: 'sine.out' });
const easeFluidOpacity = gsap.quickTo(holeMotion, 'fluidOpacity', { duration: 0.7, ease: 'power3.out' });
const easeBurst = gsap.quickTo(holeMotion, 'burst', { duration: 0.35, ease: 'power4.out' });

const HOLE_PALETTES = [
  [0x00ffee, 0x1238ff, 0x00ff55, 0xff1177],
  [0xff0066, 0x7b2cff, 0x00d9ff, 0xffd000],
  [0x22ff88, 0x004dff, 0xf000ff, 0xff5a00],
  [0x66ff00, 0x00e5ff, 0x4455ff, 0xff00aa],
  [0xffcc00, 0xff2266, 0x00ffaa, 0x2a4bff],
  [0x00ffcc, 0xff00cc, 0xffee00, 0x00a2ff],
];

function randomizeBlackHoleLook() {
  const palette = HOLE_PALETTES[(Math.random() * HOLE_PALETTES.length) | 0];
  holeFluidUniforms.uPaletteA.value.setHex(palette[0]);
  holeFluidUniforms.uPaletteB.value.setHex(palette[1]);
  holeFluidUniforms.uPaletteC.value.setHex(palette[2]);
  holeFluidUniforms.uPaletteD.value.setHex(palette[3]);
  holeFluidUniforms.uFlowSeed.value.set(
    Math.random(),
    Math.random(),
    Math.random(),
    Math.random()
  );
}

function nudgeBlackHoleFlow(dx, dy) {
  if (holeState === 'exploding') return;
  const influence = 1.15;
  const targetX = Math.max(-1.8, Math.min(1.8, holeMotion.inputX + Math.sign(dx) * influence));
  const targetY = Math.max(-1.8, Math.min(1.8, holeMotion.inputY + Math.sign(dy) * influence));
  gsap.to(holeMotion, {
    inputX: targetX,
    inputY: targetY,
    duration: 0.18,
    ease: 'power4.out',
    overwrite: 'auto',
    onComplete: () => {
      gsap.to(holeMotion, {
        inputX: 0,
        inputY: 0,
        duration: 1.9,
        ease: 'power2.out',
        overwrite: 'auto',
      });
    },
  });
}

randomizeBlackHoleLook();

function updateHoleVisual(t) {
  const holeMax = getHoleMaxForLevel(entropyQuotaLevel);
  const ratio = holeValue / holeMax;
  easeHoleCharge(ratio);
  easeTileAlpha(0);
  easeFluidOpacity(holeState === 'rainbow' ? 0 : Math.min(0.92, 0.16 + ratio * 0.76));
  easeBurst(holeState === 'exploding' ? 1 : 0);
  const ptPos = holePtGeo.attributes.position.array;
  const ptCol = holePtGeo.attributes.color.array;
  const easedRatio = holeMotion.charge;
  const shaderCharge = easedRatio * 2.0; // UI 滿值=100%，黑洞飽和度滿值=200%
  const tileVisCount = Math.floor(easedRatio * HOLE_TILE_COUNT);

  holeFluidUniforms.uTime.value = t;
  holeFluidUniforms.uCharge.value = shaderCharge;
  holeFluidUniforms.uOpacity.value = holeMotion.fluidOpacity;
  holeFluidUniforms.uBurst.value = holeMotion.burst;
  holeFluidUniforms.uInput.value.set(holeMotion.inputX, holeMotion.inputY);
  holeTileUniforms.uTime.value = t;
  holeTileUniforms.uAlpha.value = holeMotion.tileAlpha;
  holeTileUniforms.uCharge.value = easedRatio;
  holeTileUniforms.uBurst.value = holeMotion.burst;

  if (holeState === 'idle' || holeState === 'charged') {
    // 小方塊/粒子層已移除，這裡只保留高濃度 GLSL 流體煙霧。
    holePtMat.opacity = 0;
    holeTileUniforms.uAlpha.value = 0;
    if (holeState === 'charged') {
      // 邊框閃爍
      const pulse = 0.5 + 0.5 * Math.sin(t * 10);
      holeFrameMat.opacity = 0.78 + pulse * 0.22;
      holeFrameMat.color.setHSL(0.96 + pulse * 0.03, 1, 0.58 + pulse * 0.28);
      holeThickFrameMat.opacity = 0.72 + pulse * 0.28;
      holeThickFrameMat.color.setHSL(0.96 + pulse * 0.04, 1, 0.7);
      holeThickFrameGroup.scale.setScalar(1.03 + pulse * 0.07);
      holeFluidUniforms.uOpacity.value = 1.35 + pulse * 0.28;
      holeFluidUniforms.uCharge.value = 2.55 + pulse * 0.3;
      voidHintEl.style.opacity = String(0.6 + pulse * 0.4);
      voidBarEl.style.background = `repeating-linear-gradient(90deg, rgba(255,255,255,0.24) 0 3px, transparent 3px 8px), hsl(${40 + pulse * 30}, 100%, ${55 + pulse * 15}%)`;
    } else {
      holeFrameMat.opacity = 0.15 + easedRatio * 0.3;
      holeFrameMat.color.setHex(0x00ffcc);
      holeThickFrameMat.opacity = 0;
      holeThickFrameGroup.scale.setScalar(1);
      voidHintEl.style.opacity = '0';
      const pct = Math.round(easedRatio * 100);
      voidBarEl.style.background = `repeating-linear-gradient(90deg, rgba(255,255,255,0.18) 0 2px, transparent 2px 7px), linear-gradient(90deg, #00ffcc ${pct}%, #aa44ff)`;
    }

    voidBarEl.style.width = `${easedRatio * 100}%`;

  } else if (holeState === 'exploding') {
    // 粒子向外爆散
    const progress = 1 - (explodeTimer / EXPLODE_DURATION);
    for (let i = 0; i < HOLE_PARTICLE_COUNT; i++) {
      ptPos[i*3]   = holePtBasePos[i*3]   + holePtVelocities[i*3]   * progress * 0.4;
      ptPos[i*3+1] = holePtBasePos[i*3+1] + holePtVelocities[i*3+1] * progress * 0.4;
      ptPos[i*3+2] = holePtBasePos[i*3+2] + holePtVelocities[i*3+2] * progress * 0.4;
      // 爆炸時全彩
      const c = new THREE.Color().setHSL((i / HOLE_PARTICLE_COUNT + progress * 0.5) % 1, 1.0, 0.7);
      ptCol[i*3]   = c.r;
      ptCol[i*3+1] = c.g;
      ptCol[i*3+2] = c.b;
    }
    holePtGeo.attributes.position.needsUpdate = true;
    holePtGeo.attributes.color.needsUpdate = true;
    holePtMat.opacity = Math.max(0, 1.0 - progress);
    holeFluidUniforms.uOpacity.value = Math.max(0, 0.45 - progress * 0.35);
    holeFluidUniforms.uBurst.value = Math.max(holeFluidUniforms.uBurst.value, 1.0 - progress * 0.25);
    holeFrameMat.opacity = Math.max(0, 1.0 - progress * 1.5);
    holeThickFrameMat.opacity = Math.max(0, 1.0 - progress * 1.4);
    for (let i = 0; i < HOLE_TILE_COUNT; i++) {
      const bx = holeTileBase[i*3];
      const by = holeTileBase[i*3+1];
      const bz = holeTileBase[i*3+2];
      const x = bx + holeTileVelocity[i*3] * progress * 0.45;
      const y = by + holeTileVelocity[i*3+1] * progress * 0.45;
      const z = bz + holeTileVelocity[i*3+2] * progress * 0.45;
      const sc = Math.max(0.001, 0.42 - progress * 0.38);
      _holeTileMatrix.identity();
      _holeTileMatrix.makeScale(sc, sc, sc);
      _holeTileMatrix.setPosition(x, y, z);
      holeTileMesh.setMatrixAt(i, _holeTileMatrix);
      _holeTileColor.setHSL((i / HOLE_TILE_COUNT + progress * 0.7) % 1, 1.0, 0.65);
      holeTileMesh.setColorAt(i, _holeTileColor);
    }
    holeTileMesh.instanceMatrix.needsUpdate = true;
    if (holeTileMesh.instanceColor) holeTileMesh.instanceColor.needsUpdate = true;
    holeTileUniforms.uAlpha.value = Math.max(0, 0.9 - progress * 0.75);
    voidBarEl.style.width = `${(1 - progress) * 100}%`;
    voidBarEl.style.background = '#ff3333';
    voidHintEl.style.opacity = '0';

  } else if (holeState === 'rainbow') {
    // 耗盡狀態，粒子消散
    holePtMat.opacity = Math.max(0, holePtMat.opacity - 0.02);
    holeTileUniforms.uAlpha.value = holeMotion.tileAlpha;
    holeFluidUniforms.uOpacity.value = holeMotion.fluidOpacity;
    holeFrameMat.opacity = 0.08;
    holeThickFrameMat.opacity = 0;
    holeFrameMat.color.setHex(0x00ffcc);
    voidBarEl.style.width = '0%';
    voidHintEl.style.opacity = '0';
  }
}

function updateCyberPulse(t) {
  collisionRingMat.color.setHSL(0.52 + 0.12 * Math.sin(t * 1.9), 0.95, 0.52 + 0.08 * Math.sin(t * 2.7));
  collisionRingMat.opacity = 0.72 + 0.22 * Math.sin(t * 2.3);
  frameMat.color.setHSL(0.58 + 0.08 * Math.sin(t * 1.4), 0.75, 0.38 + 0.06 * Math.sin(t * 2.1));
  frameMat.opacity = 0.12 + 0.08 * Math.sin(t * 1.7);
  gridMat.color.setHSL(0.48 + 0.1 * Math.sin(t * 2.5), 0.85, 0.55);
  gridMat.opacity = 0.18 + 0.12 * Math.sin(t * 1.85);
  starMat.opacity = 0.5 + 0.22 * Math.sin(t * 1.55);
  starMat.color.setHSL(0.55 + 0.15 * Math.sin(t * 0.9), 0.6, 0.75);
}

function animate() {
  requestAnimationFrame(animate);
  const rawDt = Math.min(clock.getDelta(), 0.05);

  if (!gameStarted) {
    if (!introWarpEl.classList.contains('show')) {
      return;
    }
    return;
  }

  if (!gameOver) {
    if (tutorialPause) {
      const elapsed = clock.getElapsedTime();
      updateCyberPulse(elapsed);
      updateHoleVisual(elapsed);
      renderer.render(scene, camera);
      return;
    }

    time += rawDt;

    if (!tutorialSeen.avoid) {
      firstCubeTimer += rawDt;
      if (firstCubeTimer >= 1.5) {
        tutorialSeen.avoid = true;
        showGuide('avoid', 'Avoid White Cubes!', '', { keys: true });
      }
    }

    if (isBreathing && holeState !== 'exploding' && holeState !== 'rainbow') {
      if (time >= breathUntilTime) {
        isBreathing = false;
        generateWave();
      }
    }

    const slowActive = globalSlowUntil > time;
    const dtEff = slowActive ? rawDt * GLOBAL_SLOW_MUL : rawDt;

    playerGroup.position.set(playerPos.x, playerPos.y, PLAYER_Z);

    if (heldMoveCode && !tutorialPause && gameStarted && !gameOver) {
      heldMoveTimer -= rawDt;
      while (heldMoveTimer <= 0 && heldMoveCode) {
        playerMoveFromKey(heldMoveCode);
        heldMoveTimer += HELD_MOVE_REPEAT_INTERVAL;
      }
    }

    // 特殊方塊教學：在首個黃/紅方塊進場前 1 秒內提示
    if (!tutorialPause) {
      for (const cube of rollingCubes) {
        if (!tutorialSeen.yellow && cube.isPickup && cube.delay <= 1) {
          tutorialSeen.yellow = true;
          showGuide('yellow', 'Color Cube', 'Hit color cubes for bonus points.', { keys: false });
          break;
        }
        if (!tutorialSeen.red && cube.isSlowdown && cube.delay <= 1) {
          tutorialSeen.red = true;
          showGuide('red', 'Red Cube', 'Hit red cubes for extra time.', { keys: false });
          break;
        }
      }
    }

    for (const cube of rollingCubes) cube.update(dtEff);
    updateFx(rawDt);

    // ── 即時追蹤力 ──
    // 每當一個方塊進場（justEntered），檢查玩家是否仍在同一軌道
    // 如果連續 N 個方塊進場且玩家位置未被覆蓋，把下一個即將進場的方塊重定向
    {
      const pTrack = getDominantPlayerTrack(playerPos.x, playerPos.y, PLAYER_XY_LIMIT, PERIM_EDGE_EPS);
      for (const cube of rollingCubes) {
        if (!cube.justEntered) continue;
        cube.justEntered = false;

        if (!tutorialSeen.yellow && cube.isPickup) {
          tutorialSeen.yellow = true;
          showGuide('yellow', 'Color Cube', 'Hit color cubes for bonus points.', { keys: false });
        } else if (!tutorialSeen.red && cube.isSlowdown) {
          tutorialSeen.red = true;
          showGuide('red', 'Red Cube', 'Hit red cubes for extra time.', { keys: false });
        }

        const remainingTrackable = rollingCubes.reduce((count, c) => {
          if (c.doneRollingOut || c.collected || c.isPickup || c.isSlowdown || c.isRainbow) return count;
          return count + 1;
        }, 0);
        if (remainingTrackable <= 2) {
          // 每波倒數第 2 個立方體開始，關閉「下一顆追蹤玩家」功能
          trackingEnabled = false;
          trackingMissCount = 0;
        }

        if (!pTrack) continue;
        if (!trackingEnabled) continue;
        if (cube.isPickup || cube.isSlowdown) continue;

        // 玩家換了軌道 → 重置計數
        if (pTrack.side !== trackingLastSide || pTrack.lane !== trackingLastLane) {
          trackingLastSide = pTrack.side;
          trackingLastLane = pTrack.lane;
          trackingMissCount = 0;
          trackingThreshold = 3 + ((Math.random() * 3) | 0);
        }

        if (cube.side === pTrack.side && cube.lane === pTrack.lane) {
          trackingMissCount = 0;
        } else {
          trackingMissCount++;
          if (trackingMissCount >= trackingThreshold) {
            // 檢查玩家軌道是否已有活躍方塊在場
            const playerTrackBusy = rollingCubes.some(c =>
              c !== cube && !c.doneRollingOut && c.delay <= 0 &&
              c.side === pTrack.side && c.lane === pTrack.lane
            );
            if (!playerTrackBusy) {
              let redirected = false;
              for (const pending of rollingCubes) {
                if (pending.delay > 0 && !pending.isPickup && !pending.isSlowdown && !pending.doneRollingOut) {
                  pending.relocate(pTrack.side, pTrack.lane);
                  redirected = true;
                  break;
                }
              }
              if (!redirected) {
                cube.relocate(pTrack.side, pTrack.lane);
              }
            }
            trackingMissCount = 0;
            trackingThreshold = 3 + ((Math.random() * 3) | 0);
          }
        }
      }
    }

    // ── 爆炸中的方塊（已移出 rollingCubes，獨立更新）──
    if (_holeExplodingCubes.length > 0) {
      for (let i = _holeExplodingCubes.length - 1; i >= 0; i--) {
        _holeExplodingCubes[i].update(rawDt);
        if (_holeExplodingCubes[i].doneRollingOut) {
          _holeExplodingCubes[i].dispose();
          _holeExplodingCubes.splice(i, 1);
        }
      }
    }

    // ── Space 後白盒子 Shader 粒子爆炸 ──
    if (whiteExplodeActive) {
      whiteExplodeTimer += rawDt * 1.25;
      whiteExplodeUniforms.uTime.value = whiteExplodeTimer;
      whiteExplodeUniforms.uOpacity.value = Math.max(0, 1 - whiteExplodeTimer);
      if (whiteExplodeTimer >= 1.05) {
        whiteExplodeActive = false;
        whiteExplodeCount = 0;
        whiteExplodeUniforms.uOpacity.value = 0;
        whiteExplodeGeo.setDrawRange(0, 0);
      }
    }

    // ── 黑洞爆炸計時 ──
    if (holeState === 'exploding') {
      explodeTimer -= rawDt;
      if (explodeTimer <= 0) {
        holeState = 'rainbow';
        // 清空剩餘爆炸方塊
        for (const c of _holeExplodingCubes) c.dispose();
        _holeExplodingCubes = [];
        rollingCubes.length = 0;
        generateRainbowWave();
      }
    }

    // 清除已滾出畫面的方塊（同時計入黑洞值）
    for (let i = rollingCubes.length - 1; i >= 0; i--) {
      if (rollingCubes[i].doneRollingOut) {
        const cube = rollingCubes[i];
        if (!cube.isPickup && !cube.isSlowdown && !cube.isRainbow && !cube.collected) {
          addScore(10);
        }
        rollingCubes[i].dispose();
        rollingCubes.splice(i, 1);
        // 計入黑洞（idle/charged 狀態下，非七彩方塊才計入）
        if (holeState === 'idle' || holeState === 'charged') {
          const hm = getHoleMaxForLevel(entropyQuotaLevel);
          holeValue = Math.min(hm, holeValue + 1);
          if (holeValue >= hm && holeState === 'idle') {
            holeState = 'charged';
            voidUiEl.classList.add('void-full');
            if (!tutorialSeen.voidFull) {
              tutorialSeen.voidFull = true;
              showGuide('voidFull', 'Heat Death Ready', 'Press Space to enter the Heat Death - Collect colors to score!', { keys: false, hint: 'Or Double click on your mobile', focusVoid: true, focusHole: true });
            }
          }
        }
      }
    }

    scoreNearMisses();
    // ── 七彩波結束後恢復關卡 ──
    if (holeState === 'rainbow' && rollingCubes.length === 0 && !isBreathing) {
      resetHoleState();
      generateWave();
    }

    tryCollectSpecials();
    updateScoreUI();
    handleHazardCollisions();

    if (!gameOver && holeState !== 'rainbow' && holeState !== 'exploding' && !isBreathing && rollingCubes.length === 0) {
      advanceWaveOrLevel();
    }
  }

  const elapsed = clock.getElapsedTime();
  for (const uniforms of oilCubeUniforms) {
    uniforms.uTime.value = elapsed;
  }
  updateCyberPulse(elapsed);
  updateHoleVisual(elapsed);
  renderer.render(scene, camera);
}

animate();
</script>
