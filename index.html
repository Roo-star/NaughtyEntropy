<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naughty Entropy · Alpha2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000; overflow: hidden; font-family: "Orbitron", "Eurostile Extended", "Bank Gothic", "Helvetica Compressed", "Formula Condensed", "Arial Narrow", sans-serif;
  touch-action: none; color: #eaffff;
}
canvas { display: block; }
#warp-overlay {
  position: fixed; inset: -12vmax; z-index: 4; pointer-events: none;
  background:
    radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 0 12%, rgba(0,0,0,0.82) 37%, #000 78%),
    repeating-conic-gradient(from 3deg at 50% 50%,
      transparent 0deg 4deg,
      rgba(255,255,255,0.62) 4.25deg 4.55deg,
      transparent 4.85deg 9deg,
      rgba(0,220,255,0.42) 9.2deg 9.55deg,
      transparent 9.9deg 18deg,
      rgba(255,0,220,0.34) 18.2deg 18.6deg,
      transparent 19deg 31deg);
  mix-blend-mode: screen;
  opacity: 0.56;
  filter: blur(1.2px) saturate(2.1) contrast(1.8);
  will-change: transform, opacity;
  contain: paint;
  animation: warpOutfall 1.15s steps(4, end) infinite;
}
#warp-overlay::before, #warp-overlay::after {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(circle at 50% 50%, transparent 0 9%, rgba(255,255,255,0.16) 12%, transparent 19%, rgba(255,255,255,0.08) 38%, transparent 62%),
    repeating-conic-gradient(from 12deg at 50% 50%,
      transparent 0deg 2.6deg,
      rgba(255,255,255,0.72) 2.75deg 3deg,
      transparent 3.3deg 7.4deg,
      rgba(255,255,255,0.38) 7.55deg 7.8deg,
      transparent 8.1deg 14deg,
      rgba(120,220,255,0.34) 14.2deg 14.55deg,
      transparent 14.9deg 27deg);
  transform-origin: 50% 50%;
  opacity: 0.62;
  will-change: transform, opacity;
  contain: paint;
  animation: warpScatterOut 0.72s steps(3, end) infinite;
}
#warp-overlay::after {
  opacity: 0.38;
  filter: blur(4px) saturate(2.7);
  animation-duration: 1.05s;
  animation-delay: -0.34s;
}
@keyframes warpOutfall {
  0% { transform: scale(0.52) rotate(0deg); opacity: 0.22; }
  28% { transform: scale(0.86) rotate(0.2deg); opacity: 0.7; }
  61% { transform: scale(1.34) rotate(-0.15deg); opacity: 0.48; }
  100% { transform: scale(1.86) rotate(0.05deg); opacity: 0.12; }
}
@keyframes warpScatterOut {
  0% { transform: scale(0.34) rotate(0deg); opacity: 0.0; }
  18% { transform: scale(0.62) rotate(-0.2deg); opacity: 0.86; }
  54% { transform: scale(1.18) rotate(0.15deg); opacity: 0.52; }
  100% { transform: scale(2.15) rotate(-0.05deg); opacity: 0.0; }
}
#gameover-mask {
  position: fixed; inset: 0; display: none; z-index: 118; pointer-events: none;
  background:
    repeating-linear-gradient(90deg, rgba(255,0,72,0.18) 0 2px, transparent 2px 10px),
    radial-gradient(circle at 50% 50%, rgba(0,0,0,0.35), rgba(0,0,0,0.84));
  backdrop-filter: blur(4px) saturate(1.6);
  mix-blend-mode: normal;
}
#intro-warp {
  position: fixed; inset: 0; z-index: 220; display: none; overflow: hidden; pointer-events: none;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.08) 0 2%, rgba(0,0,0,0.16) 7%, #000 62%),
    #000;
  perspective: 1100px;
  transform-style: preserve-3d;
}
#intro-warp.show { display: block; animation: introWarpFade 10.8s ease-in-out forwards; }
#intro-warp.show.ending { animation: introRevealGame 1.8s ease-in-out forwards; }
#intro-warp::before,
#intro-warp::after {
  content: ""; position: absolute; inset: -8vmax; z-index: 1; pointer-events: none;
  background:
    repeating-conic-gradient(from 45deg at 50% 50%,
      rgba(0,255,255,0.0) 0deg 5deg,
      rgba(0,255,255,0.28) 5deg 7deg,
      rgba(255,0,255,0.26) 7deg 9deg,
      rgba(255,245,0,0.2) 9deg 10deg,
      transparent 10deg 18deg),
    radial-gradient(circle at 50% 50%, rgba(0,0,0,0.98) 0 4%, rgba(255,255,255,0.12) 7%, transparent 18%, rgba(0,0,0,0.84) 70%);
  mix-blend-mode: screen;
  filter: blur(2px) saturate(2.35) contrast(1.28);
  transform-origin: 50% 50%;
  will-change: transform, opacity;
  animation: introTunnelPush 7.6s cubic-bezier(0.12, 0.76, 0.16, 1) forwards;
}
#intro-warp::after {
  opacity: 0.45; filter: blur(12px) saturate(3);
  animation-name: introTunnelGlow;
}
.intro-wall {
  position: absolute; left: 50%; top: 50%; z-index: 1; width: 132vw; height: 132vh;
  transform-origin: 50% 50%;
  background:
    repeating-linear-gradient(90deg, rgba(0,255,255,0.12) 0 18px, rgba(255,0,255,0.15) 18px 38px, rgba(255,245,0,0.1) 38px 58px),
    repeating-linear-gradient(0deg, transparent 0 22px, rgba(255,255,255,0.11) 22px 24px),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.32), transparent 8%, rgba(0,0,0,0.82) 52%);
  mix-blend-mode: screen;
  filter: saturate(2.15) contrast(1.16);
  opacity: 0.64;
  will-change: background-position, opacity;
  animation: introWallDrift 1.65s linear infinite;
}
.intro-wall.top { clip-path: polygon(0 0, 100% 0, 57% 50%, 43% 50%); transform: translate(-50%, -50%); }
.intro-wall.bottom { clip-path: polygon(0 100%, 100% 100%, 57% 50%, 43% 50%); transform: translate(-50%, -50%); animation-delay: -0.41s; }
.intro-wall.left { clip-path: polygon(0 0, 0 100%, 43% 57%, 43% 43%); transform: translate(-50%, -50%); animation-delay: -0.82s; }
.intro-wall.right { clip-path: polygon(100% 0, 100% 100%, 57% 57%, 57% 43%); transform: translate(-50%, -50%); animation-delay: -1.23s; }
.intro-frame {
  position: absolute; left: 50%; top: 50%; z-index: 2; width: 30vmin; height: 30vmin;
  transform: translate(-50%, -50%) translateZ(-1800px) scale(0.05);
  border: 1.5px solid rgba(255,255,255,0.86);
  background:
    linear-gradient(90deg, rgba(0,255,255,0.24), rgba(255,0,255,0.2), rgba(255,245,0,0.2)),
    repeating-linear-gradient(45deg, rgba(255,255,255,0.16) 0 9px, transparent 9px 20px),
    rgba(0,0,0,0.12);
  box-shadow:
    0 0 24px rgba(0,255,255,0.7),
    0 0 54px rgba(255,0,255,0.38),
    inset 0 0 24px rgba(255,255,255,0.32);
  mix-blend-mode: screen;
  will-change: transform, opacity;
  animation: introFrameFly 1.45s cubic-bezier(0.08, 0.78, 0.12, 1) infinite;
}
.intro-frame:nth-of-type(5) { animation-delay: 0s; }
.intro-frame:nth-of-type(6) { animation-delay: -0.27s; }
.intro-frame:nth-of-type(7) { animation-delay: -0.54s; }
.intro-frame:nth-of-type(8) { animation-delay: -0.81s; }
.intro-frame:nth-of-type(9) { animation-delay: -1.08s; }
.intro-frame:nth-of-type(10) { animation-delay: -1.35s; }
.intro-frame:nth-of-type(11) { animation-delay: -1.62s; }
.intro-frame:nth-of-type(12) { animation-delay: -1.89s; }
.intro-frame::before {
  content: ""; position: absolute; inset: -2px;
  background:
    repeating-linear-gradient(90deg, rgba(0,255,255,0.35) 0 8px, rgba(255,0,255,0.28) 8px 16px, rgba(255,245,0,0.3) 16px 24px, transparent 24px 38px);
  opacity: 0.34;
  clip-path: polygon(0 0, 100% 0, 100% 14%, 0 14%, 0 86%, 100% 86%, 100% 100%, 0 100%);
  animation: introTextureTear 0.9s steps(2, end) infinite;
}
#intro-warp-text {
  position: absolute; left: 50%; top: 50%; z-index: 20; transform: translate(-50%, -50%);
  width: min(900px, 86vw); text-align: center;
  color: #fff; font-size: clamp(20px, 4vw, 54px); font-weight: 900;
  letter-spacing: 0.12em; text-transform: uppercase;
  text-shadow:
    0 0 18px #fff,
    5px 0 #00ffff,
    -5px 0 #ff00ff,
    0 4px #fff000;
  mix-blend-mode: normal;
  animation: introTextPhase 10.8s ease-in-out forwards;
}
#intro-blackout {
  position: absolute; inset: 0; background: #000; opacity: 0; z-index: 10;
  animation: introBlackout 10.6s cubic-bezier(0.12, 0.78, 0.12, 1) forwards;
}
@keyframes introFrameFly {
  0% { transform: translate(-50%, -50%) translateZ(-1900px) scale(0.045); opacity: 0; }
  18% { opacity: 0.55; }
  76% { opacity: 0.9; }
  100% { transform: translate(-50%, -50%) translateZ(620px) scale(7.2); opacity: 0; }
}
@keyframes introTextureTear {
  0%, 100% { transform: translateX(0); opacity: 0.22; }
  50% { transform: translateX(7px); opacity: 0.5; }
}
@keyframes introTunnelPush {
  0% { transform: scale(0.72) rotate(0deg); opacity: 0.38; }
  42% { transform: scale(1.08) rotate(0.18deg); opacity: 0.7; }
  72% { transform: scale(1.58) rotate(-0.12deg); opacity: 0.82; }
  100% { transform: scale(2.8) rotate(0.08deg); opacity: 0; }
}
@keyframes introTunnelGlow {
  0% { transform: scale(0.55); opacity: 0.18; }
  58% { transform: scale(1.2); opacity: 0.42; }
  100% { transform: scale(3.4); opacity: 0; }
}
@keyframes introWallDrift {
  from { background-position: 0 0, 0 0, 50% 50%; }
  to { background-position: 0 260px, 0 420px, 50% 50%; }
}
@keyframes introTextPhase {
  0%, 10% { opacity: 0; transform: translate(-50%, -50%) scale(1.04); }
  16%, 96% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(0.96); }
}
@keyframes introBlackout {
  0%, 70% { opacity: 0; }
  76%, 100% { opacity: 1; }
}
@keyframes introWarpFade {
  0% { opacity: 1; }
  100% { opacity: 1; }
}
@keyframes introRevealGame {
  0% { opacity: 1; }
  100% { opacity: 0; }
}
#ui {
  position: fixed; top: 16px; left: 16px; width: auto; pointer-events: none;
  z-index: 10; color: #eaffff; padding: 14px 16px;
  min-width: 170px;
  background:
    repeating-linear-gradient(90deg, rgba(0,255,220,0.12) 0 1px, transparent 1px 8px),
    linear-gradient(135deg, rgba(0,20,28,0.7), rgba(30,0,45,0.38));
  border: 1px solid rgba(0,255,220,0.34);
  box-shadow: 0 0 24px rgba(0,255,220,0.16), inset 0 0 18px rgba(255,255,255,0.04);
  backdrop-filter: blur(7px);
  border-radius: 10px;
  overflow: hidden;
}
#ui::before, #void-ui::before, #guide-card::before, #gameover::before {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background:
    repeating-linear-gradient(90deg, rgba(0,255,220,0.18) 0 1px, transparent 1px 7px, rgba(170,68,255,0.14) 7px 8px, transparent 8px 13px),
    repeating-linear-gradient(0deg, transparent 0 5px, rgba(255,255,255,0.05) 5px 6px);
  mix-blend-mode: screen;
  opacity: 0.72;
  animation: scanlineJitter 0.72s steps(2, end) infinite;
  z-index: 0;
}
#ui > *, #void-ui > *, #guide-card > *, #gameover > * { position: relative; z-index: 1; }
#ui, #void-ui, #guide-card, #gameover, #floating-text { isolation: isolate; }
@keyframes scanlineJitter {
  0%, 100% { transform: translateX(0); opacity: 0.58; }
  35% { transform: translateX(1px); opacity: 0.85; }
  70% { transform: translateX(-2px); opacity: 0.66; }
}
#level {
  font-size: 13px; opacity: 0.9; margin-bottom: 7px; color: #ffd86b;
  letter-spacing: 2px; text-transform: uppercase;
  text-shadow: 0 0 8px rgba(255,216,107,0.75), 2px 0 rgba(0,255,220,0.26), -2px 0 rgba(170,68,255,0.28);
}
#score {
  font-size: 36px; line-height: 1; color: #f8ffff; letter-spacing: 3px; font-weight: 900;
  text-shadow:
    0 0 10px rgba(0,255,220,0.9),
    0 0 24px rgba(170,68,255,0.45),
    2px 0 #00ffff,
    -2px 0 #ff00ff,
    0 2px #fff35a;
  filter: saturate(1.35);
}
#score::before { content: "SCORE "; font-size: 11px; color: rgba(0,255,220,0.72); letter-spacing: 3px; -webkit-text-fill-color: rgba(0,255,220,0.72); }
#lives {
  font-size: 20px; margin-top: 9px; color: #ff3366; letter-spacing: 6px;
  text-shadow: 0 0 12px rgba(255,0,72,1), 0 0 30px rgba(255,0,120,0.62);
  image-rendering: pixelated;
  animation: livesPixelGlitch 1.05s steps(2, end) infinite;
}
@keyframes livesPixelGlitch {
  0%, 100% { transform: translateX(0); filter: saturate(1.1); }
  44% { transform: translateX(1px); filter: saturate(2.2) brightness(1.28); }
  48% { transform: translateX(-2px); }
  52% { transform: translateX(0); }
}
#floating-text {
  position: fixed; left: 50%; top: 34%; transform: translate(-50%, -50%);
  z-index: 140; pointer-events: none; font-family: inherit; font-size: 26px;
  color: #ffffff; opacity: 0; text-align: center; letter-spacing: 4px;
  padding: 0; border-radius: 0; overflow: visible;
  background: transparent;
  border: 0;
  box-shadow: none;
  backdrop-filter: none;
  -webkit-text-stroke: 1px rgba(0,0,0,0.78);
  text-shadow:
    0 0 10px rgba(255,255,255,1),
    0 0 28px rgba(0,255,220,0.9),
    3px 0 rgba(0,255,255,0.85),
    -3px 0 rgba(255,0,255,0.8),
    0 3px rgba(255,242,0,0.72);
}
#floating-text::before { display: none; }
#floating-text.shader-feedback {
  top: 50%;
  background: transparent;
  border: 0;
  box-shadow: none;
  backdrop-filter: none;
  font-size: clamp(30px, 7vw, 88px);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-shadow:
    0 0 18px rgba(255,255,255,1),
    0 0 48px rgba(0,255,220,0.9),
    4px 0 rgba(170,68,255,0.72),
    -4px 0 rgba(255,216,107,0.55);
}
#gameover {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  display: none; z-index: 120; text-align: center;
  color: #fff; letter-spacing: 0.08em;
  animation: gameoverGlitch 0.85s steps(2, end) infinite;
}
#gameover-title {
  position: relative; margin-bottom: 18px;
  font-size: clamp(54px, 10vw, 132px); line-height: 0.85; font-weight: 900; font-style: italic;
  color: #fff;
  text-shadow:
    0 0 24px rgba(255,0,72,1),
    8px 0 #00ffff,
    -8px 0 #ff00ff,
    0 7px #fff000;
}
#gameover-title::before,
#gameover-title::after {
  content: attr(data-text); position: absolute; inset: 0; pointer-events: none; mix-blend-mode: screen;
}
#gameover-title::before { color: #00ffff; transform: translate(-8px, 3px); clip-path: inset(12% 0 58% 0); }
#gameover-title::after { color: #ff00ff; transform: translate(8px, -2px); clip-path: inset(55% 0 14% 0); }
#gameover-panel {
  position: relative; min-width: min(420px, 82vw);
  padding: 24px 30px; border: 2px solid rgba(255,0,72,0.78); background: rgba(22,0,12,0.86);
  box-shadow: 0 0 54px rgba(255,0,72,0.72), 0 0 120px rgba(255,0,120,0.38), inset 0 0 30px rgba(255,0,72,0.2);
  overflow: hidden; font-size: 24px;
  text-shadow: 0 0 16px rgba(255,0,72,0.9), 3px 0 rgba(0,255,255,0.36), -3px 0 rgba(255,0,255,0.36);
}
#gameover span { color: #fff2f6; background: rgba(255,0,72,0.22); padding: 0 10px; box-shadow: 0 0 20px rgba(255,0,72,0.65); }
#gameover p { font-size: 16px; margin-top: 16px; opacity: 0.82; }
@keyframes gameoverGlitch {
  0%, 100% { filter: saturate(1.2) brightness(1); }
  44% { filter: saturate(2.5) brightness(1.32); transform: translate(-50%, -50%) skewX(0deg); }
  48% { transform: translate(calc(-50% + 3px), -50%) skewX(-3deg); }
  52% { transform: translate(calc(-50% - 2px), -50%) skewX(2deg); }
}
#cyber-overlay {
  position: fixed; inset: 0; pointer-events: none; z-index: 6;
  background:
    repeating-linear-gradient(90deg, rgba(0,255,220,0.055) 0px, rgba(0,255,220,0.055) 2px, transparent 2px, transparent 12px),
    repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(170,68,255,0.04) 3px, rgba(170,68,255,0.04) 4px),
    radial-gradient(ellipse 80% 50% at 50% 100%, rgba(120, 0, 255, 0.12), transparent 55%);
  mix-blend-mode: screen;
  opacity: 0.38;
  animation: cyberScan 1.8s steps(6, end) infinite;
}
@keyframes cyberScan {
  from { transform: translateY(0); }
  to { transform: translateY(6px); }
}
#ui { text-shadow: 0 0 12px rgba(0, 255, 220, 0.35); animation: uiPulse 1.4s steps(3, end) infinite; }
@keyframes uiPulse {
  0%, 100% { filter: brightness(1) saturate(1.2); }
  50% { filter: brightness(1.22) saturate(2); }
}
#dev-panel {
  position: fixed; bottom: 12px; right: 12px; z-index: 100;
  display: flex; gap: 6px; align-items: center;
  pointer-events: auto;
}
#dev-panel button {
  background: rgba(255,255,255,0.08); color: #0ff; border: 1px solid rgba(0,255,220,0.4);
  font-family: inherit; font-size: 13px; padding: 4px 10px; cursor: pointer;
  border-radius: 3px; transition: background 0.15s;
}
#dev-panel button:hover { background: rgba(0,255,220,0.18); }
#dev-toggle {
  position: fixed; bottom: 12px; right: 12px; z-index: 101;
  background: rgba(255,255,255,0.06); color: #0ff; border: 1px solid rgba(0,255,220,0.3);
  font-family: inherit; font-size: 11px; padding: 3px 8px; cursor: pointer;
  border-radius: 3px;
}
#void-ui {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 10; pointer-events: none; display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 12px 16px 14px;
  background:
    repeating-linear-gradient(90deg, rgba(0,255,220,0.12) 0 1px, transparent 1px 9px),
    rgba(0, 10, 18, 0.64);
  border: 1px solid rgba(0,255,220,0.28);
  border-radius: 14px;
  box-shadow: 0 0 26px rgba(0,255,220,0.15), inset 0 0 22px rgba(170,68,255,0.08);
  backdrop-filter: blur(8px);
  overflow: hidden;
}
#void-label {
  font-family: inherit; font-size: 12px; letter-spacing: 5px; color: rgba(0,255,220,0.86);
  text-shadow: 0 0 10px rgba(0,255,220,0.8), 2px 0 rgba(170,68,255,0.28);
}
#void-bar-wrap {
  width: min(340px, 70vw); height: 14px; background: rgba(0,255,220,0.09);
  border: 1px solid rgba(0,255,220,0.32); border-radius: 999px; overflow: hidden;
  box-shadow: inset 0 0 18px rgba(0,0,0,0.65), 0 0 18px rgba(0,255,220,0.12);
}
#void-bar {
  height: 100%; width: 0%;
  background:
    repeating-linear-gradient(90deg, rgba(255,255,255,0.18) 0 2px, transparent 2px 7px),
    linear-gradient(90deg, #00ffcc, #aa44ff);
  transition: width 0.15s ease; border-radius: 999px;
  box-shadow: 0 0 18px rgba(0,255,220,0.75), 0 0 30px rgba(170,68,255,0.4);
}
#void-charged-hint {
  font-family: inherit; font-size: 10px; color: #fff;
  opacity: 0; letter-spacing: 4px;
  text-shadow: 0 0 12px #fff, 2px 0 rgba(0,255,220,0.35), -2px 0 rgba(170,68,255,0.28);
  transition: opacity 0.3s;
}
#guide-overlay {
  position: fixed; inset: 0; z-index: 110; display: none; align-items: center; justify-content: center;
  background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.45), rgba(0,0,0,0.82));
  pointer-events: auto; backdrop-filter: blur(2px);
}
#guide-overlay.show { display: flex; }
#guide-overlay.hole-open {
  background:
    radial-gradient(circle at 50% 50%, transparent 0 22vmin, rgba(0,0,0,0.22) 28vmin, rgba(0,0,0,0.82) 100%);
}
#guide-card {
  position: relative;
  z-index: 113;
  max-width: min(560px, 86vw); padding: 24px 28px;
  color: #efffff; text-align: center;
  background:
    repeating-linear-gradient(90deg, rgba(0,255,220,0.1) 0 1px, transparent 1px 10px),
    linear-gradient(135deg, rgba(0,24,32,0.86), rgba(40,0,54,0.72));
  border: 1px solid rgba(0,255,220,0.42);
  border-radius: 16px;
  box-shadow: 0 0 44px rgba(0,255,220,0.22), inset 0 0 28px rgba(255,255,255,0.06);
  overflow: hidden;
}
#guide-card.guide-focus {
  border-color: rgba(255,255,255,0.78);
  box-shadow: 0 0 52px rgba(0,255,220,0.55), 0 0 90px rgba(170,68,255,0.25), inset 0 0 34px rgba(255,255,255,0.1);
}
#guide-card.guide-focus #guide-body {
  color: #ffffff;
  text-shadow: 0 0 14px rgba(0,255,220,0.95), 0 0 32px rgba(170,68,255,0.65);
  font-weight: 700;
}

{

<script type="module">
import * as THREE from 'three';
import { gsap } from 'gsap';

const GAME_VERSION = 'Alpha2';
if (typeof globalThis !== 'undefined') {
  globalThis.GRID_TUNNEL_VERSION = GAME_VERSION;
}

// ── Constants ──
const CELL = 1;
const TUNNEL_HALF = 3;
const NEAR_Z = 1;                // near mouth of tunnel
const MAX_DEPTH = 22;            // tunnel length / wrap（方塊多時須較長）
const FADE_START = 17;           // start fading at this depth
const ROLL_SPEED = 3.0 * 1.25 * 1.25;
/** 同一 (牆,lane) 上相鄰兩顆沿深度的間距（世界深度單位） */
const MIN_DEPTH_GAP = 1;
const MAX_DEPTH_GAP = 5;
const PHYS_STEP = 1 / 120;       // 固定子步進，滾動更連續、減少頓挫
/** 判定周長上每步一格（與 CELL 同單位）；格點為半整數，與六軌道中心重合；僅 keydown 離散步進 */
const PLAYER_GRID_STEP = CELL;
const CUBE_EDGE = CELL * 0.95;
// 原碰撞面 z=-2，再向隧道內（更負 z）移 3 排，每排約 1
const PLAYER_Z = -5;
// 與白方塊在碰撞面上相同世界邊長（透視下會比在近處時看起來更小）
const PLAYER_CUBE_SIZE = CUBE_EDGE;
/** 白方塊完全過判定面後，再經過此深度（與 CELL 同單位）內滾動淡出 */
const PAST_LINE_FADE_DEPTH = 3 * CELL;
// 與四面牆六軌道中心對齊（軌心 x/y = ±2.5, ±1.5, …，間距 1）；周長半寬 = TUNNEL_HALF - 0.5
const PLAYER_XY_LIMIT = TUNNEL_HALF - 0.5;
const PERIM_EDGE_EPS = 0.07;

// ── 黑洞系統常數 ──
/** Lv.1 滿條所需方塊數 */
const HOLE_ENTROPY_BASE = 30;
/** 指數曲線套用至 Lv.6；Lv.7+ 門檻同 Lv.6 */
const HOLE_ENTROPY_EXP_MAX_LEVEL = 6;
/**
 * 五檔指數：門檻 = round(30 × HOLE_ENTROPY_EXP_RATIO^((lv-1)/5))。
 * Lv1 30 → Lv2 40 → Lv3 52 → Lv4 69 → Lv5 91 → Lv6 120
 */
const HOLE_ENTROPY_EXP_RATIO = 4;

function getHoleMaxForLevel(lv) {
  const clamped = Math.min(HOLE_ENTROPY_EXP_MAX_LEVEL, Math.max(1, lv | 0));
  const span = HOLE_ENTROPY_EXP_MAX_LEVEL - 1;
  const t = span > 0 ? (clamped - 1) / span : 0;
  return Math.max(1, Math.round(HOLE_ENTROPY_BASE * Math.pow(HOLE_ENTROPY_EXP_RATIO, t)));
}

const HOLE_REGION = 2;         // 中央 ±2 範圍（4×4）
const RAINBOW_COUNT_RANGE = [22, 26];
const EXPLODE_DURATION = 0.55; // 爆炸動畫持續秒數

function snapToJudgmentPerimeter(px, py, L) {
  const c1 = { x: Math.max(-L, Math.min(L, px)), y: -L };
  const c2 = { x: Math.max(-L, Math.min(L, px)), y: L };
  const c3 = { x: -L, y: Math.max(-L, Math.min(L, py)) };
  const c4 = { x: L, y: Math.max(-L, Math.min(L, py)) };
  let best = c1;
  let bd = (px - c1.x) ** 2 + (py - c1.y) ** 2;
  for (const c of [c2, c3, c4]) {
    const d = (px - c.x) ** 2 + (py - c.y) ** 2;
    if (d < bd) { bd = d; best = c; }
  }
  return best;
}

/** 依目前貼邊過濾本幀位移：貼左僅 dy、貼下僅 dx；角落禁止同時往內對角 */
function filterJudgmentPerimeterInput(px, py, dx, dy, L, eps) {
  const onL = px <= -L + eps;
  const onR = px >= L - eps;
  const onB = py <= -L + eps;
  const onT = py >= L - eps;

  let ndx = dx;
  let ndy = dy;

  if (onB && onL) {
    if (ndx < 0) ndx = 0;
    if (ndy < 0) ndy = 0;
    if (ndx !== 0 && ndy !== 0) {
      if (Math.abs(ndx) >= Math.abs(ndy)) ndy = 0;
      else ndx = 0;
    }
    return { dx: ndx, dy: ndy };
  }
  if (onB && onR) {
    if (ndx > 0) ndx = 0;
    if (ndy < 0) ndy = 0;
    if (ndx !== 0 && ndy !== 0) {
      if (Math.abs(ndx) >= Math.abs(ndy)) ndy = 0;
      else ndx = 0;
    }
    return { dx: ndx, dy: ndy };
  }
  if (onT && onL) {
    if (ndx < 0) ndx = 0;
    if (ndy > 0) ndy = 0;
    if (ndx !== 0 && ndy !== 0) {
      if (Math.abs(ndx) >= Math.abs(ndy)) ndy = 0;
      else ndx = 0;
    }
    return { dx: ndx, dy: ndy };
  }
  if (onT && onR) {
    if (ndx > 0) ndx = 0;
    if (ndy > 0) ndy = 0;
    if (ndx !== 0 && ndy !== 0) {
      if (Math.abs(ndx) >= Math.abs(ndy)) ndy = 0;
      else ndx = 0;
    }
    return { dx: ndx, dy: ndy };
  }
  if (onB) return { dx: ndx, dy: 0 };
  if (onT) return { dx: ndx, dy: 0 };
  if (onL) return { dx: 0, dy: ndy };
  if (onR) return { dx: 0, dy: ndy };
  return { dx: 0, dy: 0 };
}

function onLaneHalfGrid(v) {
  const k = v * 2;
  return Math.abs(k - Math.round(k)) < 1e-5;
}

function snapCoordToHalfGrid(v) {
  return Math.round(v * 2) / 2;
}

/** 是否在判定周長的離散格點上（半整數網格、步長 1，每邊 6 格對應六軌道） */
function onDiscreteJudgmentPerimeter(x, y, L) {
  const tol = 1e-5;
  if (Math.abs(x) > L + tol || Math.abs(y) > L + tol) return false;
  if (!onLaneHalfGrid(x) || !onLaneHalfGrid(y)) return false;
  const onE = (a) => Math.abs(Math.abs(a) - L) < tol;
  return onE(x) || onE(y);
}

/** 沿周長移動恰好一格；依 filter 轉角規則 */
function discreteStepAlongEdge(px, py, sdx, sdy, L, eps) {
  const f = filterJudgmentPerimeterInput(px, py, sdx * 1024, sdy * 1024, L, eps);
  if (Math.abs(f.dx) < 1e-12 && Math.abs(f.dy) < 1e-12) return null;
  let nx = px;
  let ny = py;
  if (Math.abs(f.dx) > 1e-12) nx += Math.sign(f.dx) * PLAYER_GRID_STEP;
  if (Math.abs(f.dy) > 1e-12) ny += Math.sign(f.dy) * PLAYER_GRID_STEP;
  if (!onDiscreteJudgmentPerimeter(nx, ny, L)) return null;
  return { x: snapCoordToHalfGrid(nx), y: snapCoordToHalfGrid(ny) };
}

function playerSpawnOnJudgmentEdge() {
  const L = PLAYER_XY_LIMIT;
  return { x: -L, y: -0.5 };
}

// ── Renderer / Scene / Camera ──
function getRenderPixelRatio() {
  const dpr = window.devicePixelRatio || 1;
  const mobile = window.innerWidth <= 820 || window.matchMedia('(pointer: coarse)').matches;
  return Math.min(dpr, mobile ? 1.25 : 1.6);
}

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(getRenderPixelRatio());
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
function isMobileViewport() {
  return window.innerWidth <= 820 || window.matchMedia('(pointer: coarse)').matches;
}
function applyViewportCamera() {
  const mobile = isMobileViewport();
  const aspect = window.innerWidth / window.innerHeight;
  camera.fov = mobile ? 90 : 75;
  camera.aspect = aspect;
  camera.zoom = mobile ? 0.86 : 1;
  camera.position.set(0, 0, mobile ? 3.1 : 2);
  camera.lookAt(0, 0, mobile ? -11.5 : -10);
  camera.updateProjectionMatrix();
}
applyViewportCamera();

window.addEventListener('resize', () => {
  applyViewportCamera();
  renderer.setPixelRatio(getRenderPixelRatio());
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Materials ──
const gridMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.58, linewidth: 5 });
const collisionRingMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9, linewidth: 3 });
const frameMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.17, linewidth: 2 });
const trailBeamGeo = new THREE.CylinderGeometry(1, 1, 1, 8, 1, true);
const TRAIL_BEAM_RADIUS = 0.035;
const TRAIL_BEAM_GLOW_RADIUS = 0.07;
const _trailBeamDummy = new THREE.Object3D();
const _Y_AXIS = new THREE.Vector3(0, 1, 0);
const _tmpDir = new THREE.Vector3();
const cubeMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true });
const cubeMatFade = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true });
const dotMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.4 });
const oilCubeUniforms = [];
function untrackOilUniformsFromMaterial(mat) {
  if (!mat || !mat.uniforms) return;
  const idx = oilCubeUniforms.indexOf(mat.uniforms);
  if (idx !== -1) oilCubeUniforms.splice(idx, 1);
}
function createOilMetalCubeMaterial(seed = Math.random() * 1000) {
  const uniforms = {
    uTime: { value: 0 },
    uOpacity: { value: 1 },
    uSeed: { value: seed },
  };
  oilCubeUniforms.push(uniforms);
  return new THREE.ShaderMaterial({
    uniforms,
    transparent: true,
    depthWrite: true,
    side: THREE.DoubleSide,
    blending: THREE.NormalBlending,
    vertexShader: `
      varying vec3 vNormalW;

        p += dot(p, p + 45.32);
        return fract(p.x * p.y);
      }

      float noise(vec2 p) {

        vec2 f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);
        float a = hash21(i);
        float b = hash21(i + vec2(1.0, 0.0));
        float c = hash21(i + vec2(0.0, 1.0));

        color = mix(color, liquidSilver, 0.26 + ribbon * 0.54 + fresnel * 0.48);

        color += silver * razorSpec * 1.15;
        color += edgeLine * silver * (0.34 + fresnel * 0.5);

    uSeed: { value: seed },

    depthWrite: false,

      varying vec3 vViewW;
      varying vec3 vPosW;

        vec4 worldPos = modelMatrix * vec4(position, 1.0);
        vPosW = worldPos.xyz;
        vNormalW = normalize(mat3(modelMatrix) * normal);
        vViewW = normalize(cameraPosition - worldPos.xyz);
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);

    `,
    fragmentShader: `
      precision highp float;
      uniform float uTime;
      uniform float uOpacity;
      uniform float uSeed;
      uniform float uPlayerGlitch;
      varying vec3 vNormalW;
      varying vec3 vViewW;
      varying vec3 vPosW;
      varying vec2 vUv;

      vec4 permute(vec4 x) { return mod(((x * 34.0) + 1.0) * x, 289.0); }
      vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

      float snoise(vec3 v) {
        const vec2 C = vec2(1.0 / 6.0, 1.0 / 3.0);
        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
        vec3 i = floor(v + dot(v, C.yyy));
        vec3 x0 = v - i + dot(i, C.xxx);
        vec3 g = step(x0.yzx, x0.xyz);
        vec3 l = 1.0 - g;
        vec3 i1 = min(g.xyz, l.zxy);
        vec3 i2 = max(g.xyz, l.zxy);
        vec3 x1 = x0 - i1 + C.xxx;
        vec3 x2 = x0 - i2 + C.yyy;
        vec3 x3 = x0 - D.yyy;
        i = mod(i, 289.0);
        vec4 p = permute(permute(permute(
          i.z + vec4(0.0, i1.z, i2.z, 1.0))
          + i.y + vec4(0.0, i1.y, i2.y, 1.0))
          + i.x + vec4(0.0, i1.x, i2.x, 1.0));
        float n_ = 0.142857142857;
        vec3 ns = n_ * D.wyz - D.xzx;
        vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
        vec4 x_ = floor(j * ns.z);
        vec4 y_ = floor(j - 7.0 * x_);
        vec4 x = x_ * ns.x + ns.yyyy;
        vec4 y = y_ * ns.x + ns.yyyy;
        vec4 h = 1.0 - abs(x) - abs(y);
        vec4 b0 = vec4(x.xy, y.xy);
        vec4 b1 = vec4(x.zw, y.zw);
        vec4 s0 = floor(b0) * 2.0 + 1.0;
        vec4 s1 = floor(b1) * 2.0 + 1.0;
        vec4 sh = -step(h, vec4(0.0));
        vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
        vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
        vec3 p0 = vec3(a0.xy, h.x);
        vec3 p1 = vec3(a0.zw, h.y);
        vec3 p2 = vec3(a1.xy, h.z);
        vec3 p3 = vec3(a1.zw, h.w);
        vec4 norm = taylorInvSqrt(vec4(dot(p0, p0), dot(p1, p1), dot(p2, p2), dot(p3, p3)));
        p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
        vec4 m = max(0.6 - vec4(dot(x0, x0), dot(x1, x1), dot(x2, x2), dot(x3, x3)), 0.0);
        m = m * m;
        return 42.0 * dot(m * m, vec4(dot(p0, x0), dot(p1, x1), dot(p2, x2), dot(p3, x3)));
      }

      vec3 prism(float x) {
        vec3 cyan = vec3(0.0, 0.95, 1.0);
        vec3 electricBlue = vec3(0.0, 0.16, 1.0);
        vec3 violet = vec3(0.64, 0.0, 1.0);
        vec3 magenta = vec3(1.0, 0.0, 0.82);
        vec3 lime = vec3(0.18, 1.0, 0.32);
        vec3 c = mix(cyan, electricBlue, smoothstep(0.0, 0.22, x));
        c = mix(c, violet, smoothstep(0.2, 0.48, x));
        c = mix(c, magenta, smoothstep(0.46, 0.74, x));
        c = mix(c, lime, smoothstep(0.72, 1.0, x));
        return c;
      }

      void main() {
        vec3 n = normalize(vNormalW);
        vec3 v = normalize(vViewW);
        float t = uTime * 0.16;
        float seed = uSeed * 0.017;
        vec2 uv = vUv * 2.0 - 1.0;
        float swirlAngle = t * 0.62 + seed + length(uv) * 1.4;
        mat2 spin = mat2(cos(swirlAngle), -sin(swirlAngle), sin(swirlAngle), cos(swirlAngle));
        vec2 spunUv = spin * uv;
        vec3 p = vec3(spunUv, dot(vPosW, vec3(0.31, 0.23, 0.17)));
        vec3 q = vec3(
          snoise(p * 0.95 + vec3(t * 0.34, seed, -t * 0.24)),
          snoise(p * 1.15 + vec3(seed, -t * 0.28, t * 0.32)),
          snoise(p * 0.85 + vec3(-t * 0.2, t * 0.38, seed))
        );
        vec3 r = p + q * 1.65;
        float broadNoise = snoise(r * 1.65 + vec3(t * 0.42, seed, -t * 0.28));
        float vein = sin((r.x * 1.8 + r.y * 1.15 + broadNoise * 2.4 + t * 1.15) * 3.14159);
        float ribbon = smoothstep(-0.18, 0.76, vein);
        float ribbonCore = smoothstep(0.52, 0.94, vein);
        float flow = fract(0.5 + 0.5 * vein + broadNoise * 0.18 + t * 0.045);
        float filmBand = max(ribbon * 0.72, ribbonCore);

        float ndv = clamp(dot(n, v), 0.0, 1.0);
        float fresnel = pow(1.0 - ndv, 1.85);
        float rim = pow(1.0 - ndv, 3.4);
        float edge = smoothstep(0.62, 0.98, max(abs(uv.x), abs(uv.y)));
        float spec = pow(max(dot(reflect(-normalize(vec3(-0.45, 0.55, 0.72)), n), v), 0.0), 96.0);
        float broadSpec = pow(max(dot(reflect(-normalize(vec3(0.24, -0.32, 0.92)), n), v), 0.0), 20.0);
        vec3 deepGlass = vec3(0.015, 0.018, 0.04);
        vec3 chrome = vec3(0.72, 0.9, 1.0) * (0.22 + 0.78 * fresnel);
        vec3 rainbow = prism(flow);
        vec3 color = mix(deepGlass, rainbow, clamp(0.45 + filmBand * 0.5 + fresnel * 0.38, 0.0, 0.96));
        color += chrome * 0.38 * (1.0 - uPlayerGlitch * 0.72);
        color += rainbow * (edge * 1.35 + rim * 1.45 + ribbonCore * 0.75);
        color += vec3(1.0) * spec * 1.9 * (1.0 - uPlayerGlitch * 0.68);
        color += vec3(0.52, 0.9, 1.0) * broadSpec * 0.62 * (1.0 - uPlayerGlitch * 0.55);
        vec3 playerPurple = vec3(0.42, 0.05, 1.0);
        color = mix(color, playerPurple * 1.15 + rainbow * 0.58, uPlayerGlitch * 0.45);
        color += uPlayerGlitch * edge * vec3(1.0, 0.66, 0.05) * 2.45;
        color += uPlayerGlitch * rim * vec3(1.0, 0.78, 0.22) * 1.65;
        float scanLine = step(0.62, fract((uv.y + t * 2.8) * 14.0)) * smoothstep(0.1, 0.92, edge + fresnel);
        float verticalGlitch = step(0.72, fract((uv.x + floor(t * 64.0) * 0.09 + seed) * 17.0));
        float glitchPulse = step(0.62, fract(sin(floor(t * 42.0) + seed * 91.7) * 43758.5453));
        vec3 glitchColor = prism(fract(flow + 0.37 + glitchPulse * 0.19));
        color += uPlayerGlitch * scanLine * vec3(1.0, 0.82, 0.28) * 2.0;
        color += uPlayerGlitch * verticalGlitch * glitchPulse * glitchColor * 1.35;
        color += uPlayerGlitch * fresnel * vec3(0.9, 0.38, 1.0) * 0.85;
        color = clamp(color, 0.0, 2.65);
        gl_FragColor = vec4(color, 1.0);
      }
    `,
  });
}

      varying vec3 vNormalW;
      varying vec3 vViewW;
      varying vec3 vPosW;

      float hash21(vec2 p) {

        p += dot(p, p + 34.23);
        return fract(p.x * p.y);
      }

      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);
        float a = hash21(i);
        float b = hash21(i + vec2(1.0, 0.0));
        float c = hash21(i + vec2(0.0, 1.0));
        float d = hash21(i + vec2(1.0, 1.0));
        return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
      }

      float fbm(vec2 p) {
        float v = 0.0;
        float amp = 0.5;
        mat2 m = mat2(1.6, 1.1, -1.1, 1.6);
        for (int i = 0; i < 5; i++) {
          v += amp * noise(p);
          p = m * p + 0.13;
          amp *= 0.52;
        }
        return v;
      }

      void main() {
        vec3 n = normalize(vNormalW);
        vec3 v = normalize(vViewW);
        float t = uTime * 0.16;
        float seed = uSeed * 0.011;
        vec2 uv = vUv * 2.0 - 1.0;
        float spin = t * 0.72 + seed + length(uv) * 1.8;
        mat2 rot = mat2(cos(spin), -sin(spin), sin(spin), cos(spin));
        vec2 p = rot * uv;
        vec2 warp = vec2(
          fbm(p * 1.4 + vec2(t * 0.32, seed)),
          fbm(p * 1.7 + vec2(seed, -t * 0.24))
        );
        vec2 q = p + (warp - 0.5) * 1.15;
        float river = sin((q.x * 2.0 + q.y * 1.25 + fbm(q * 2.1) * 3.1 + t * 1.2) * 3.14159);
        float ribbon = smoothstep(-0.22, 0.82, river);
        float core = smoothstep(0.5, 0.95, river);
        float fresnel = pow(1.0 - clamp(dot(n, v), 0.0, 1.0), 2.25);
        float spec = pow(max(dot(reflect(-normalize(vec3(-0.4, 0.6, 0.7)), n), v), 0.0), 54.0);
        float edge = smoothstep(0.64, 0.98, max(abs(uv.x), abs(uv.y)));

        vec3 hueC = normalize(uBaseColor.gbr + vec3(0.18, 0.05, 0.08));

      vec2 waveFlow = vec2(
        sin((p.y + guided.y) * (3.5 + uFlowSeed.y * 5.0) + uTime * (0.5 + uFlowSeed.z)),
        cos((p.x + guided.x) * (4.0 + uFlowSeed.z * 4.5) - uTime * (0.45 + uFlowSeed.y))
      ) * (0.18 + uCharge * 0.34);
      vec2 diagonalFlow = normalize(vec2(0.35 + uFlowSeed.x, 0.65 + uFlowSeed.z)) * (sin(dot(p, vec2(2.5, -1.8)) + uTime) * 0.38);
      vec2 flow = spiralFlow;
      flow = mix(flow, waveFlow, step(1.0, mode) * (1.0 - step(2.0, mode)));
      flow = mix(flow, diagonalFlow, step(2.0, mode) * (1.0 - step(3.0, mode)));
      flow += guided * 1.4 + inputTangent;

      float n1 = fbm(p * (2.2 + uFlowSeed.y * 1.8 + uCharge * 4.8) + flow + vec2(uTime * (0.07 + uFlowSeed.x * 0.08), -uTime * (0.05 + uFlowSeed.z * 0.08)));
      float n2 = fbm(p * (4.8 + uFlowSeed.z * 4.2 + uCharge * 3.0) - flow * (1.8 + uFlowSeed.y) + uTime * (0.1 + uFlowSeed.x * 0.16));
      float n3 = fbm(p * (8.0 + uFlowSeed.y * 6.0) + vec2(sin(uTime * (0.17 + uFlowSeed.x * 0.14)), cos(uTime * (0.13 + uFlowSeed.z * 0.18))) * 1.2 + guided * 1.7);
      float vortex = smoothstep(1.38, 0.03, r) * (0.78 + 0.92 * n1);
      float smoke = smoothstep(0.03, 0.66, n1 * 0.72 + n2 * 0.42 + n3 * 0.22);
      float burst = uBurst * smoothstep(0.05, 1.2, r) * (1.0 - smoothstep(1.0, 1.55, r));

      vec3 color = mix(uPaletteA, uPaletteB, smoothstep(0.0, 0.58, n1));
      color = mix(color, uPaletteC, smoothstep(0.25, 0.78, sin(uTime * 0.95 + p.y * 6.5 + n2 * 2.0 + uFlowSeed.x * 6.2831) * 0.5 + 0.5));
      color = mix(color, uPaletteD, smoothstep(0.22, 0.95, n2 + uCharge * 0.35));
      color = mix(color, uPaletteA + uPaletteC * 0.45, smoothstep(0.78, 1.0, uCharge) * smoothstep(0.58, 0.96, n3));
      color *= 1.15 + uCharge * 1.65;
      color += burst * vec3(1.6, 0.7, 0.12);

      float alpha = (vortex * smoke * (0.42 + uCharge * 0.92) + burst * 0.72) * uOpacity;
      float squareMask = 1.0 - smoothstep(1.12, 1.42, r);
      float fullCharge = smoothstep(1.65, 2.15, uCharge);
      float scan = 0.72 + 0.28 * step(0.5, fract(vUv.x * 38.0 + uTime * 6.0));
      float chromaBand = sin((p.x * 9.0 - p.y * 6.5) + uTime * 9.0 + n3 * 5.0) * 0.5 + 0.5;
      vec3 saturatedA = mix(uPaletteA * 1.9, uPaletteD * 1.55, chromaBand);
      vec3 saturatedB = mix(uPaletteB * 1.75, uPaletteC * 1.85, n2);
      vec3 fullColor = mix(saturatedA, saturatedB, smoothstep(0.12, 0.92, n1 + n3 * 0.35));
      color = mix(color, color * 1.35 + fullColor * (1.1 + scan * 0.55), fullCharge);
      alpha = max(alpha, fullCharge * squareMask * scan * (0.68 + 0.2 * sin(uTime * 14.0 + n2 * 4.0)));
      vec2 eyeP = p * vec2(1.08, 0.94);
      float eyeRadius = 0.82;
      vec2 eyeOffset = vec2(0.0, 0.46);
      float dEye = max(length(eyeP - eyeOffset) - eyeRadius, length(eyeP + eyeOffset) - eyeRadius);
      float eyeMask = (1.0 - smoothstep(-0.025, 0.04, dEye)) * fullCharge;
      float eyeRim = (1.0 - smoothstep(0.0, 0.055, abs(dEye))) * fullCharge;

      // Domain-warped, self-distorting field. This is the eye texture itself, not a separate layer.
      float stretch = fbm(vec2(eyeP.x * 42.0, uTime * 0.11));
      vec2 sortedP = eyeP;
      sortedP.y += (stretch - 0.5) * (0.2 + fullCharge * 0.42);
      vec2 warpA = vec2(
        fbm(sortedP * 2.2 + vec2(uTime * 0.13, -uTime * 0.08)),
        fbm(sortedP * 2.6 + vec2(-uTime * 0.1, uTime * 0.12))
      );
      vec2 warpB = vec2(
        fbm((sortedP + warpA * 0.9) * 5.4 + vec2(uTime * 0.08, 1.7)),
        fbm((sortedP - warpA * 0.7) * 6.2 + vec2(2.1, -uTime * 0.09))
      );
      vec2 warpedEye = sortedP + (warpA - 0.5) * 0.52 + (warpB - 0.5) * 0.26;
      float eyeField = fbm(warpedEye * 9.0 + vec2(uTime * 0.05, -uTime * 0.04));
      eyeField += fbm(warpedEye * 22.0 + warpB * 2.1) * 0.42;
      eyeField = fract(eyeField * 1.18 + stretch * 0.34);
      float drip = step(0.62, stretch) * (1.0 - smoothstep(-0.72, 0.76, sortedP.y));
      float verticalSort = step(0.68, fract(eyeP.x * 78.0 + stretch * 9.0)) * drip;

      vec3 eyePalette = 0.42 + 0.58 * cos(6.28318 * (vec3(0.08, 0.42, 0.72) + eyeField + vec3(0.0, 0.24, 0.52)));
      eyePalette = mix(eyePalette, vec3(0.05, 0.95, 0.82), smoothstep(0.45, 0.92, warpB.x));
      eyePalette = mix(eyePalette, vec3(0.86, 0.1, 1.0), smoothstep(0.36, 0.82, warpA.y));
      eyePalette += verticalSort * vec3(0.0, 0.75, 0.95);

      vec2 gaze = clamp(uInput, vec2(-1.8), vec2(1.8)) * vec2(0.16, 0.11);
      vec2 irisP = (eyeP - gaze) * vec2(1.0, 1.08);
      float irisR = length(irisP);
      float irisMask = (1.0 - smoothstep(0.25, 0.42, irisR)) * eyeMask;
      float pupilMask = (1.0 - smoothstep(0.08, 0.145, irisR)) * eyeMask;
      float irisField = fract(atan(irisP.y, irisP.x) / 6.28318 + irisR * 2.6 + eyeField * 0.5 + uTime * 0.08);
      vec3 irisColor = mix(uPaletteC * 1.8, uPaletteD * 1.55, irisField);
      irisColor = mix(irisColor, uPaletteA * 1.9, smoothstep(0.17, 0.02, irisR));

      color = mix(color, eyePalette * (1.05 + verticalSort * 0.45), eyeMask * 0.88);
      color += eyeRim * vec3(0.08, 1.0, 0.86) * 1.45;
      color = mix(color, irisColor, irisMask * 0.92);
      color = mix(color, vec3(0.0, 0.0, 0.028), pupilMask * 0.96);
      color += irisMask * (1.0 - smoothstep(0.012, 0.04, abs(irisR - 0.42))) * vec3(0.9, 1.0, 1.75);
      alpha = max(alpha, eyeMask * (0.56 + verticalSort * 0.22) + irisMask * 0.26);
      alpha *= squareMask;
      alpha = clamp(alpha, 0.0, 0.96);
      gl_FragColor = vec4(color, alpha);
    }
  `,
});

  transparent: true,
  depthWrite: false,
  side: THREE.DoubleSide,
  blending: THREE.AdditiveBlending,

  vertexShader: `
    attribute vec3 instanceColor;
    varying vec2 vUv;
    varying vec3 vColor;
    varying float vPulse;
    uniform float uTime;

    void main() {
      vUv = uv;
      vColor = instanceColor;
      vec3 pos = position;
      float seed = instanceColor.r * 13.17 + instanceColor.g * 7.91 + instanceColor.b * 3.13;
      vPulse = 0.5 + 0.5 * sin(uTime * 2.5 + seed * 6.2831);
      pos.xy *= 0.82 + vPulse * 0.22;

      #ifdef USE_INSTANCING
        gl_Position = projectionMatrix * modelViewMatrix * instanceMatrix * vec4(pos, 1.0);
      #else
        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      #endif
    }
  `,
  fragmentShader: `
    precision highp float;
    varying vec2 vUv;
    varying vec3 vColor;
    varying float vPulse;
    uniform float uAlpha;
    uniform float uCharge;
    uniform float uBurst;

    void main() {
      vec2 p = abs(vUv - 0.5) * 2.0;
      float outer = max(p.x, p.y);
      float inner = max(abs(vUv.x - 0.5), abs(vUv.y - 0.5));

      // 透明方形：強邊框 + 弱中心，形成參考視頻中的 hollow square 顆粒
      float edge = smoothstep(0.58, 0.98, outer);
      float hollow = 1.0 - smoothstep(0.26, 0.42, inner);
      float core = (1.0 - outer) * 0.18;
      float glow = edge * (0.55 + vPulse * 0.45) + hollow * 0.14 + core;
      glow += uCharge * 0.25 + uBurst * 0.45;

      vec3 color = vColor * (0.78 + vPulse * 0.5);
      float alpha = glow * uAlpha;
      if (alpha < 0.015) discard;
      gl_FragColor = vec4(color, alpha);
    }
  `,
});

function flashHitFace(cube) {
  const c = cube.getWorldCenter();
  hitFlashMesh.position.set(c.x, c.y, PLAYER_Z);
  hitFlashMesh.scale.setScalar(1);
  hitFlashMesh.visible = true;
  hitFlashMat.opacity = 0.95;
  gsap.killTweensOf(hitFlashMat);
  gsap.killTweensOf(hitFlashMesh.scale);
  gsap.to(hitFlashMat, { opacity: 0, duration: 0.34, ease: 'power2.out', onComplete: () => { hitFlashMesh.visible = false; } });
  gsap.to(hitFlashMesh.scale, { x: 1.75, y: 1.75, z: 1, duration: 0.34, ease: 'power2.out' });
}

function spawnParticles(center, color, count, power) {
  let spawned = false;
  for (let n = 0; n < count; n++) {
    let idx = -1;
    for (let step = 0; step < FX_MAX; step++) {
      const i = (fxSpawnCursor + step) % FX_MAX;
      if (fxLife[i] <= 0) { idx = i; break; }
    }
    if (idx < 0) break;
    fxSpawnCursor = (idx + 1) % FX_MAX;
    const a = Math.random() * Math.PI * 2;
    const z = (Math.random() - 0.35) * power;
    const s = power * (0.35 + Math.random());
    fxPos[idx*3] = center.x;
    fxPos[idx*3+1] = center.y;
    fxPos[idx*3+2] = center.z;
    fxVel[idx*3] = Math.cos(a) * s;
    fxVel[idx*3+1] = Math.sin(a) * s;
    fxVel[idx*3+2] = z;
    fxColor[idx*3] = color.r;
    fxColor[idx*3+1] = color.g;
    fxColor[idx*3+2] = color.b;
    fxLife[idx] = 1;
    spawned = true;
  }
  if (spawned) fxGeo.attributes.color.needsUpdate = true;
}

function updateFx(dt) {
  let active = 0;
  for (let i = 0; i < FX_MAX; i++) {
    if (fxLife[i] <= 0) continue;
    fxLife[i] -= dt * 1.8;
    if (fxLife[i] <= 0) {
      fxPos[i*3+2] = 9999;
      continue;
    }
    active++;
    fxPos[i*3] += fxVel[i*3] * dt;
    fxPos[i*3+1] += fxVel[i*3+1] * dt;
    fxPos[i*3+2] += fxVel[i*3+2] * dt;
    fxVel[i*3] *= 0.985;
    fxVel[i*3+1] *= 0.985;
    fxVel[i*3+2] *= 0.985;
  }
  fxMat.opacity = active > 0 ? 0.9 : 0;
  fxGeo.attributes.position.needsUpdate = true;
}

    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(linePts), collisionRingMat));
  }
}

// ── Dotted cube factory ──
function createRoundedBoxGeometry(size, radius = 0.08, segments = 6) {
  const geo = new THREE.BoxGeometry(size, size, size, segments, segments, segments);
  const pos = geo.attributes.position;
  const half = size * 0.5;
  const inner = half - radius;
  const v = new THREE.Vector3();
  const q = new THREE.Vector3();
  const d = new THREE.Vector3();
  for (let i = 0; i < pos.count; i++) {
    v.fromBufferAttribute(pos, i);
    q.set(
      Math.max(-inner, Math.min(inner, v.x)),
      Math.max(-inner, Math.min(inner, v.y)),
      Math.max(-inner, Math.min(inner, v.z))
    );
    d.copy(v).sub(q);
    if (d.lengthSq() > 1e-8) {
      d.normalize().multiplyScalar(radius);
      v.copy(q).add(d);
      pos.setXYZ(i, v.x, v.y, v.z);
    }
  }
  geo.computeVertexNormals();
  return geo;
}
const cubeGeo = createRoundedBoxGeometry(CUBE_EDGE, CUBE_EDGE * 0.085, 8);
const dotGeoW = new THREE.BoxGeometry(0.1, 0.1, 0.1);

function createDottedCube(material, dMat, opts = {}) {
  const includeDots = opts.includeDots !== false;
  const includeFrame = opts.includeFrame === true;
  const group = new THREE.Group();
  group.add(new THREE.Mesh(cubeGeo, material));
  if (includeFrame) {
    const edgeGeo = new THREE.EdgesGeometry(cubeGeo);
    const frameMat = dMat || dotMat;
    const frame = new THREE.LineSegments(edgeGeo, frameMat);
    frame.renderOrder = 2;
    group.add(frame);
  }
  if (!includeDots) return group;
  const half = CUBE_EDGE / 2 + 0.01;
  const sp = CUBE_EDGE / 5;
  const faces = [
    { axis: 'z', val:  half, u: 'x', v: 'y' },
    { axis: 'z', val: -half, u: 'x', v: 'y' },
    { axis: 'y', val:  half, u: 'x', v: 'z' },
    { axis: 'y', val: -half, u: 'x', v: 'z' },
    { axis: 'x', val:  half, u: 'y', v: 'z' },
    { axis: 'x', val: -half, u: 'y', v: 'z' },
  ];
  for (const f of faces) {
    for (let r = 1; r <= 4; r++) {
      for (let c = 1; c <= 4; c++) {
        const dot = new THREE.Mesh(dotGeoW, dMat || dotMat);
        const p = { x: 0, y: 0, z: 0 };
        p[f.axis] = f.val;
        p[f.u] = -CUBE_EDGE / 2 + c * sp;
        p[f.v] = -CUBE_EDGE / 2 + r * sp;
        dot.position.set(p.x, p.y, p.z);
        group.add(dot);
      }
    }
  }
  return group;
}

// ── Rolling cube with dynamic grid trail ──
class RollingCube {
  /**
   * @param {object} [opts]
   * @param {number}  [opts.speedMul=1]
   * @param {boolean} [opts.isPickup]  金色可拾取
   * @param {boolean} [opts.isSlowdown] 紅色全局減速
   */
  constructor(side, lane, startDepth, opts) {
    this.side = side;
    this.lane = lane;
    this.depth = Number(startDepth) || 0;
    this.cellIndex = Math.floor(this.depth);
    this.rollT = this.depth - this.cellIndex;

    const o = opts || {};
    this.isPickup = o.isPickup === true;
    this.isSlowdown = o.isSlowdown === true;
    this.isRainbow = o.isRainbow === true;
    this.speedMul = typeof o.speedMul === 'number' && o.speedMul > 0
      ? o.speedMul
      : this.isPickup
        ? (Math.random() < 0.5 ? 0.25 : 0.5)
        : this.isSlowdown
          ? SLOWDOWN_CUBE_SPEED_MUL
          : 1;
    this.collected = false;
    this.doneRollingOut = false;
    this.justEntered = false;
    // 爆炸狀態
    this.exploding = false;
    this.explodeT = 0;

    /** 延遲出發秒數：方塊尚未進場，不渲染也不碰撞 */
    this.delay = typeof o.delay === 'number' ? o.delay : 0;
    if (this.delay <= 0) this.justEntered = true;

    // 壞立方體行為: 'bounce' | 'slide' | 'reverse' | null
    this.badBehavior = o.badBehavior || null;
    this._bounceNext = false;
    this._slideTriggered = false;
    this._reverseState = 0;
    this._reverseDepthMark = 0;

    if (this.isRainbow) {
      // 隨機 HSL 鮮豔色彩
      const hue = Math.random();
      const rbColor = new THREE.Color().setHSL(hue, 1.0, 0.65);
      this.fxColor = rbColor.clone();
      this.cubeFadeMat = createScoreColorMaterial(rbColor, Math.random() * 1000);
      this.dotFadeMat = new THREE.MeshBasicMaterial({
        color: rbColor, wireframe: true, transparent: true, opacity: 0.6, depthWrite: false,
      });
    } else if (this.isPickup) {
      this.cubeFadeMat = createPrismaticCubeMaterial(Math.random() * 1000);
      this.dotFadeMat = createPrismaticCubeMaterial(Math.random() * 1000);
    } else if (this.isSlowdown) {
      const redColor = new THREE.Color(0xff2222);
      this.fxColor = redColor.clone();
      this.cubeFadeMat = createScoreColorMaterial(redColor, Math.random() * 1000);
      this.dotFadeMat = redDotMat.clone();
    } else {
      this.cubeFadeMat = createOilMetalCubeMaterial(Math.random() * 1000);
      this.dotFadeMat = dotMat.clone();
      this.dotFadeMat.color.setHex(0x9fefff);
      this.dotFadeMat.opacity = 0.26;
    }
    this.mesh = createDottedCube(this.cubeFadeMat, this.dotFadeMat, {
      includeDots: true,
      includeFrame: false,
    });
    this.pivot = new THREE.Group();
    this.pivot.add(this.mesh);
    scene.add(this.pivot);

    // Dynamic grid trail — LineSegments with updatable buffer
    // Max segments: 2 depth lines + (MAX_DEPTH+2) cross lines = ~14 segments = 28 verts
    const maxVerts = (2 + MAX_DEPTH + 2) * 2;
    this.trailBuf = new Float32Array(maxVerts * 3);
    this.trailGeo = new THREE.BufferGeometry();
    this.trailGeo.setAttribute('position', new THREE.BufferAttribute(this.trailBuf, 3));
    const useCustomTrail = this.isPickup || this.isSlowdown || this.isRainbow;
    this.trailLine = new THREE.LineSegments(
      this.trailGeo,
      useCustomTrail ? gridMat.clone() : gridMat
    );
    if (this.isPickup) {
      this.trailLine.material.color.setHex(0x66ffff);
      this.trailLine.material.opacity = 0.72;
    } else if (this.isSlowdown) {
      this.trailLine.material.color.setHex(0xff4444);
      this.trailLine.material.opacity = 0.7;
    } else if (this.isRainbow) {
      this.trailLine.material.color.copy(this.fxColor || this.cubeFadeMat.color || new THREE.Color(0x66ffff));
      this.trailLine.material.opacity = 0.82;
    }
    this.trailLine.material.linewidth = 5;
    this.trailGlowLine = new THREE.LineSegments(
      this.trailGeo,
      this.trailLine.material.clone()
    );
    this.trailGlowLine.material.opacity = Math.min(1, (this.trailLine.material.opacity || 0.58) * 0.55);
    this.trailGlowLine.material.linewidth = 10;
    this.trailBeamMat = new THREE.MeshBasicMaterial({
      color: this.trailLine.material.color.clone(),
      transparent: true,
      opacity: Math.min(0.78, (this.trailLine.material.opacity || 0.58) * 0.72),
      depthWrite: false,
      blending: THREE.AdditiveBlending,
    });
    this.trailBeamGlowMat = this.trailBeamMat.clone();
    this.trailBeamGlowMat.opacity = Math.min(0.38, this.trailBeamMat.opacity * 0.55);
    const maxTrailSegments = maxVerts / 2;
    this.maxTrailSegments = maxTrailSegments;
    this.trailBeamMesh = new THREE.InstancedMesh(trailBeamGeo, this.trailBeamMat, maxTrailSegments);
    this.trailBeamGlowMesh = new THREE.InstancedMesh(trailBeamGeo, this.trailBeamGlowMat, maxTrailSegments);
    this.trailBeamMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    this.trailBeamGlowMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    this.trailBeamMesh.count = 0;
    this.trailBeamGlowMesh.count = 0;
    this.trailBeamMesh.frustumCulled = false;
    this.trailBeamGlowMesh.frustumCulled = false;
    this.trailBeamMesh.renderOrder = -1;
    this.trailBeamGlowMesh.renderOrder = -2;
    scene.add(this.trailBeamGlowMesh);
    scene.add(this.trailBeamMesh);
    this.pivot.renderOrder = 1;
    this.mesh.traverse((ch) => {
      if (ch.isMesh) ch.renderOrder = 1;
    });
    this.trailGlowLine.renderOrder = -1;
    this.trailLine.renderOrder = 0;
    scene.add(this.trailGlowLine);
    scene.add(this.trailLine);

    this.visible = true;
    this._updateAll();
  }

  relocate(newSide, newLane) {
    this.side = newSide;
    this.lane = newLane;
    this._updateAll();
  }

  // Lane edge coordinates on the wall surface
  _laneEdges() {
    const TH = TUNNEL_HALF;
    if (this.side === 'bottom' || this.side === 'top') {
      const y = (this.side === 'bottom') ? -TH : TH;
      const x0 = -TH + this.lane;
      const x1 = x0 + 1;
      return { a: { primary: y, cross0: x0, cross1: x1, pAxis: 'y', cAxis: 'x' }};
    } else {
      const x = (this.side === 'left') ? -TH : TH;
      const y0 = -TH + this.lane;
      const y1 = y0 + 1;
      return { a: { primary: x, cross0: y0, cross1: y1, pAxis: 'x', cAxis: 'y' }};
    }
  }

  _setTrailBeam(segIndex, x1, y1, z1, x2, y2, z2) {
    if (!this.trailBeamMesh || segIndex >= this.maxTrailSegments) return;
    const dx = x2 - x1;
    const dy = y2 - y1;
    const dz = z2 - z1;
    const len = Math.max(0.001, Math.hypot(dx, dy, dz));
    const midX = (x1 + x2) * 0.5;
    const midY = (y1 + y2) * 0.5;
    const midZ = (z1 + z2) * 0.5;
    _trailBeamDummy.position.set(midX, midY, midZ);
    _trailBeamDummy.quaternion.setFromUnitVectors(_Y_AXIS, _tmpDir.set(dx / len, dy / len, dz / len));
    _trailBeamDummy.scale.set(TRAIL_BEAM_RADIUS, len, TRAIL_BEAM_RADIUS);
    _trailBeamDummy.updateMatrix();
    this.trailBeamMesh.setMatrixAt(segIndex, _trailBeamDummy.matrix);
    _trailBeamDummy.scale.set(TRAIL_BEAM_GLOW_RADIUS, len, TRAIL_BEAM_GLOW_RADIUS);
    _trailBeamDummy.updateMatrix();
    this.trailBeamGlowMesh.setMatrixAt(segIndex, _trailBeamDummy.matrix);
    const nextCount = segIndex + 1;
    if (this.trailBeamMesh.count < nextCount) this.trailBeamMesh.count = nextCount;
    if (this.trailBeamGlowMesh.count < nextCount) this.trailBeamGlowMesh.count = nextCount;
    this._trailBeamMatrixDirty = true;
  }

  _hideTrailBeams(fromIndex = 0) {
    if (!this.trailBeamMesh || !this.trailBeamGlowMesh) return;
    const nextCount = Math.max(0, Math.min(this.maxTrailSegments, fromIndex | 0));
    this.trailBeamMesh.count = nextCount;
    this.trailBeamGlowMesh.count = nextCount;
    this._trailBeamMatrixDirty = true;
  }

  _addSeg(idx, x1,y1,z1, x2,y2,z2) {
    this._setTrailBeam(idx / 6, x1, y1, z1, x2, y2, z2);
    this.trailBuf[idx]   = x1; this.trailBuf[idx+1] = y1; this.trailBuf[idx+2] = z1;
    this.trailBuf[idx+3] = x2; this.trailBuf[idx+4] = y2; this.trailBuf[idx+5] = z2;
    return idx + 6;
  }

  _updateTrail() {
    const depth = this.depth;
    const farZ = -depth;
    const e = this._laneEdges().a;
    let idx = 0;

    if (e.pAxis === 'y') {
      // bottom or top wall
      // 2 depth lines
      idx = this._addSeg(idx, e.cross0, e.primary, NEAR_Z, e.cross0, e.primary, farZ);
      idx = this._addSeg(idx, e.cross1, e.primary, NEAR_Z, e.cross1, e.primary, farZ);
      // Cross lines at each cell boundary
      const maxD = Math.floor(depth);
      for (let d = -1; d <= maxD; d++) {
        const z = -d;
        if (z > NEAR_Z) continue;
        if (z < farZ) break;
        idx = this._addSeg(idx, e.cross0, e.primary, z, e.cross1, e.primary, z);
      }
    } else {
      // left or right wall
      idx = this._addSeg(idx, e.primary, e.cross0, NEAR_Z, e.primary, e.cross0, farZ);
      idx = this._addSeg(idx, e.primary, e.cross1, NEAR_Z, e.primary, e.cross1, farZ);
      const maxD = Math.floor(depth);
      for (let d = -1; d <= maxD; d++) {
        const z = -d;
        if (z > NEAR_Z) continue;
        if (z < farZ) break;
        idx = this._addSeg(idx, e.primary, e.cross0, z, e.primary, e.cross1, z);
      }
    }

    this._hideTrailBeams(idx / 6);
    this.trailBuf.fill(0, idx);
    this.trailGeo.attributes.position.needsUpdate = true;
    this.trailGeo.setDrawRange(0, idx / 3);
    if (this._trailBeamMatrixDirty) {
      this.trailBeamMesh.instanceMatrix.needsUpdate = true;
      this.trailBeamGlowMesh.instanceMatrix.needsUpdate = true;
      this._trailBeamMatrixDirty = false;
    }
  }

  wallPos(laneIdx) {
    return -TUNNEL_HALF + laneIdx + 0.5;
  }

  _rollAxis() {
    return ROLL_AXIS[this.side];
  }

  getWorldCenter() {
    const z = -this.depth;
    const lp = this.wallPos(this.lane);
    const wo = TUNNEL_HALF - 0.5;
    switch (this.side) {
      case 'bottom': return new THREE.Vector3(lp, -wo, z);
      case 'top':    return new THREE.Vector3(lp,  wo, z);
      case 'left':   return new THREE.Vector3(-wo, lp, z);
      case 'right':  return new THREE.Vector3( wo, lp, z);
    }
  }

  _updateCube() {
    const totalDepth = this.depth;
    const hw = CUBE_EDGE * 0.5;
    const zc = -this.depth;

    if (totalDepth > MAX_DEPTH) {
      this.pivot.visible = false;
      this.visible = false;
      return;
    }
    this.visible = true;
    this.pivot.visible = true;

    const whiteNearZ = zc + hw;
    const fullyPastPlane = whiteNearZ < PLAYER_Z;
    let op = 1;
    let scale = 1;

    // 入場淡入：depth 0→2 時從 0 漸變到 1，避免洞口突然閃現
    const FADE_IN_DEPTH = 2;
    if (totalDepth < FADE_IN_DEPTH) {
      const fi = totalDepth / FADE_IN_DEPTH;
      op *= fi;
      scale *= 0.5 + 0.5 * fi;
    }

    if (totalDepth > FADE_START) {
      const t = (totalDepth - FADE_START) / (MAX_DEPTH - FADE_START);
      op *= 1 - t;
      scale = 1 - t * 0.5;
    }

    if (fullyPastPlane) {
      const pastDist = PLAYER_Z - whiteNearZ;
      const u = Math.min(1, pastDist / PAST_LINE_FADE_DEPTH);
      op *= 1 - u;
      scale *= 1 - u * 0.35;
    }

    if (this.isPickup) {
      this.cubeFadeMat.depthWrite = true;
      this.cubeFadeMat.transparent = false;
    } else if (this.cubeFadeMat.uniforms && this.cubeFadeMat.uniforms.uOpacity) {
      this.cubeFadeMat.uniforms.uOpacity.value = Math.max(0, op);
      this.cubeFadeMat.transparent = true;
      this.cubeFadeMat.depthWrite = op >= 0.999;
    } else {
      this.cubeFadeMat.opacity = Math.max(0, op);
      this.cubeFadeMat.transparent = op < 0.999;
      this.cubeFadeMat.depthWrite = op >= 0.999;
    }
    this.dotFadeMat.opacity = 0.4 * Math.max(0, op);
    if (this.dotFadeMat.uniforms && this.dotFadeMat.uniforms.uOpacity) {
      this.dotFadeMat.uniforms.uOpacity.value = Math.max(0, op);
    }
    this.dotFadeMat.transparent = true;
    this.dotFadeMat.depthWrite = false;
    this.pivot.scale.setScalar(scale);

    if (op <= 0.02) {
      this.pivot.visible = false;
      this.visible = false;
      return;
    }

    // 連續深度驅動：樞軸在牆面中心線上 z=-depth，旋轉角為 depth 的累積四分之一圈。
    // 與 getWorldCenter() 一致，避免「整數格樞軸 + rollT」在跨格時的幾何不連續與微顫。
    const lp = this.wallPos(this.lane);
    const wo = TUNNEL_HALF - 0.5;
    const axis = this._rollAxis();
    const angle = this.depth * Math.PI * 0.5;

    switch (this.side) {
      case 'bottom': this.pivot.position.set(lp, -wo, zc); break;
      case 'top':    this.pivot.position.set(lp,  wo, zc); break;
      case 'left':   this.pivot.position.set(-wo, lp, zc); break;
      case 'right':  this.pivot.position.set( wo, lp, zc); break;
    }
    this.mesh.position.set(0, 0, 0);
    this.mesh.quaternion.setFromAxisAngle(axis, angle);
  }

  _updateAll() {
    this._updateCube();
    if (!this.visible) {
      this.trailGeo.setDrawRange(0, 0);
      this._hideTrailBeams(0);
      return;
    }
    this._updateTrail();
  }

  triggerExplosion() {
    this.exploding = true;
    this.explodeT = 0;
    // 記住爆炸起點世界位置
    const wc = this.getWorldCenter();
    this._explodeOrigin = wc.clone();
    const angle = Math.random() * Math.PI * 2;
    const spd = 4 + Math.random() * 6;
    this._explodeVel = new THREE.Vector3(
      Math.cos(angle) * spd,
      Math.sin(angle) * spd,
      (Math.random() - 0.3) * 3
    );
  }

  update(dt) {
    if (this.doneRollingOut) return;

    // 爆炸動畫
    if (this.exploding) {
      this.explodeT += dt * 2.2;
      const t = this.explodeT;
      const op = Math.max(0, 1 - t);
      const sc = 1 + t * 2.5;
      this.pivot.scale.setScalar(sc);
      if (this.isPickup) {
        this.cubeFadeMat.transparent = false;
      } else if (this.cubeFadeMat.uniforms && this.cubeFadeMat.uniforms.uOpacity) {
        this.cubeFadeMat.uniforms.uOpacity.value = op;
      } else {
        this.cubeFadeMat.opacity = op;
      }
      if (this.dotFadeMat.uniforms && this.dotFadeMat.uniforms.uOpacity) {
        this.dotFadeMat.uniforms.uOpacity.value = op;
      } else {
        this.dotFadeMat.opacity = op * 0.4;
      }
      this.cubeFadeMat.transparent = true;
      this.pivot.visible = op > 0.01;
      // 讓方塊向外飛
      if (this._explodeOrigin && this._explodeVel) {
        const nx = this._explodeOrigin.x + this._explodeVel.x * t * 0.3;
        const ny = this._explodeOrigin.y + this._explodeVel.y * t * 0.3;
        const nz = this._explodeOrigin.z + this._explodeVel.z * t * 0.3;
        this.pivot.position.set(nx, ny, nz);
        this.trailGeo.setDrawRange(0, 0);
      }
      if (t >= 1.0) {
        this.doneRollingOut = true;
      }
      return;
    }

    // 延遲倒數：尚未進場
    if (this.delay > 0) {
      this.delay -= dt;
      if (this.delay > 0) {
        this.pivot.visible = false;
        this.trailGeo.setDrawRange(0, 0);
        this.visible = false;
        return;
      }
      this.justEntered = true;
    }

    const judgDepth = -PLAYER_Z;

    if (this.badBehavior === 'bounce') {
      let left = Math.min(dt, 0.08);
      while (left > 0) {
        const step = Math.min(left, PHYS_STEP);
        const prevCell = this.cellIndex;
        this.depth += step * ROLL_SPEED * this.speedMul;
        this.cellIndex = Math.floor(this.depth);
        if (this.cellIndex !== prevCell && this._bounceNext) {
          this.depth += 1;
          this.cellIndex = Math.floor(this.depth);
          this._bounceNext = false;
        } else if (this.cellIndex !== prevCell) {
          this._bounceNext = true;
        }
        this.rollT = this.depth - this.cellIndex;
        left -= step;
      }
    } else if (this.badBehavior === 'slide') {
      let left = Math.min(dt, 0.08);
      while (left > 0) {
        const step = Math.min(left, PHYS_STEP);
        this.depth += step * ROLL_SPEED * this.speedMul;
        this.cellIndex = Math.floor(this.depth);
        this.rollT = this.depth - this.cellIndex;
        left -= step;
      }
      if (!this._slideTriggered && this.depth >= judgDepth - 2 && this.depth < judgDepth - 1) {
        this._slideTriggered = true;
        const others = allWallSlots().filter(s => !(s.side === this.side && s.lane === this.lane));
        if (others.length > 0) {
          const target = others[(Math.random() * others.length) | 0];
          this.side = target.side;
          this.lane = target.lane;
        }
      }
    } else if (this.badBehavior === 'reverse') {
      let left = Math.min(dt, 0.08);
      if (this._reverseState === 0) {
        while (left > 0) {
          const step = Math.min(left, PHYS_STEP);
          this.depth += step * ROLL_SPEED * this.speedMul;
          left -= step;
        }
        if (this.depth >= judgDepth + 2) {
          this._reverseState = 1;
          this._reverseDepthMark = this.depth;
        }
      } else if (this._reverseState === 1) {
        while (left > 0) {
          const step = Math.min(left, PHYS_STEP);
          this.depth -= step * ROLL_SPEED * this.speedMul;
          if (this.depth < 0) this.depth = 0;
          left -= step;
        }
        if (this.depth <= judgDepth) {
          this._reverseState = 2;
        }
      } else {
        while (left > 0) {
          const step = Math.min(left, PHYS_STEP);
          this.depth += step * ROLL_SPEED * this.speedMul;
          left -= step;
        }
      }
      this.cellIndex = Math.floor(this.depth);
      this.rollT = this.depth - this.cellIndex;
    } else {
      let left = Math.min(dt, 0.08);
      while (left > 0) {
        const step = Math.min(left, PHYS_STEP);
        this.depth += step * ROLL_SPEED * this.speedMul;
        this.cellIndex = Math.floor(this.depth);
        this.rollT = this.depth - this.cellIndex;
        left -= step;
      }
    }

    this._updateAll();

    if (this.depth >= MAX_DEPTH || (!this.visible && this.depth > FADE_START)) {
      this.doneRollingOut = true;
    }
  }

  dispose() {
    scene.remove(this.pivot);
    scene.remove(this.trailGlowLine);
    scene.remove(this.trailLine);
    if (this.trailBeamMesh) scene.remove(this.trailBeamMesh);
    if (this.trailBeamGlowMesh) scene.remove(this.trailBeamGlowMesh);
    untrackOilUniformsFromMaterial(this.cubeFadeMat);
    untrackOilUniformsFromMaterial(this.dotFadeMat);
    if (this.cubeFadeMat && this.cubeFadeMat !== cubeMat && this.cubeFadeMat !== cubeMatFade) {
      this.cubeFadeMat.dispose();
    }
    if (this.dotFadeMat && this.dotFadeMat !== dotMat) {
      this.dotFadeMat.dispose();
    }
    if (this.trailBeamMat) this.trailBeamMat.dispose();
    if (this.trailBeamGlowMat) this.trailBeamGlowMat.dispose();
    if (this.trailGlowLine.material) {
      this.trailGlowLine.material.dispose();
    }
    if (this.trailLine.material && this.trailLine.material !== gridMat) {
      this.trailLine.material.dispose();
    }
    this.trailGeo.dispose();
  }
}

function allWallSlots() {
  const sides = ['bottom', 'top', 'left', 'right'];
  const slots = [];
  for (const side of sides) {
    for (let lane = 0; lane < wallLanes; lane++) {
      slots.push({ side, lane });
    }
  }
  return slots;
}

function slotKey(s) {
  return `${s.side}:${s.lane}`;
}

function pickTwoForbiddenSlotsLv4() {
  let pool = allWallSlots().slice();
  if (lastWavePlayerTrack) {
    const lk = slotKey(lastWavePlayerTrack);
    pool = pool.filter((s) => slotKey(s) !== lk);
  }
  if (pool.length < 2) pool = allWallSlots().slice();
  shuffleInPlace(pool);
  return [pool[0], pool[1]];
}

function generateRainbowWave() {
  const n = RAINBOW_COUNT_RANGE[0] + ((Math.random() * (RAINBOW_COUNT_RANGE[1] - RAINBOW_COUNT_RANGE[0] + 1)) | 0);
  const slots = roundRobinSlots(allWallSlots(), n);
  const spreadSec = Math.max(2, n * 0.2);
  const delays = assignRandomDelays(n, spreadSec);
  for (let i = 0; i < n; i++) {
    rollingCubes.push(new RollingCube(slots[i].side, slots[i].lane, 0, {
      isRainbow: true,
      speedMul: 0.8,
      delay: delays[i],
    }));

}

function spawnWhiteCubeParticleExplosion(cubes) {
  let idx = 0;
  for (const cube of cubes) {
    if (cube.doneRollingOut || cube.delay > 0 || cube.isPickup || cube.isSlowdown || cube.isRainbow) continue;
    const center = cube.getWorldCenter();
    const perCube = 34;
    for (let j = 0; j < perCube && idx < WHITE_EXPLOSION_MAX; j++, idx++) {
      const ox = (Math.random() - 0.5) * CUBE_EDGE;
      const oy = (Math.random() - 0.5) * CUBE_EDGE;
      const oz = (Math.random() - 0.5) * CUBE_EDGE;
      whiteExplodePos[idx*3] = center.x + ox;
      whiteExplodePos[idx*3+1] = center.y + oy;
      whiteExplodePos[idx*3+2] = center.z + oz;

      const len = Math.max(0.001, Math.hypot(ox, oy, oz));
      const speed = 3.5 + Math.random() * 6.5;
      whiteExplodeVel[idx*3] = (ox / len) * speed + (Math.random() - 0.5) * 1.5;
      whiteExplodeVel[idx*3+1] = (oy / len) * speed + (Math.random() - 0.5) * 1.5;
      whiteExplodeVel[idx*3+2] = (oz / len) * speed - Math.random() * 3.0;
      whiteExplodeSeed[idx] = Math.random();
    }
  }
  whiteExplodeCount = idx;
  whiteExplodeTimer = 0;
  whiteExplodeActive = idx > 0;
  whiteExplodeUniforms.uTime.value = 0;
  whiteExplodeUniforms.uOpacity.value = idx > 0 ? 1 : 0;

  whiteExplodeGeo.attributes.position.needsUpdate = true;
  whiteExplodeGeo.attributes.aVelocity.needsUpdate = true;
  whiteExplodeGeo.attributes.aSeed.needsUpdate = true;
}

function advanceWaveOrLevel() {
  if (gameOver) return;
  const L = PLAYER_XY_LIMIT;
  const track = getDominantPlayerTrack(playerPos.x, playerPos.y, L, PERIM_EDGE_EPS);

  }

  currentWaveIndex++;

  if (currentWaveIndex < def.waves.length) {
    // 第四關波間無喘息，直接進下一波

    } else {

    }
  } else {

      currentLevel++;
      updateLevelUI();
    }
    currentWaveIndex = 0;
